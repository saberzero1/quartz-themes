mode: replace
sections:
  - name: RBR
    id: rbr-theme
    collapsed: false
    settings:
      - id: rbr-section-accent
        title: Accent
        type: heading
        level: 2
        collapsed: false
      - id: rbr-accent-choice
        title: Primary accent color
        description: |
          활성/선택 항목 강조에 쓰일 메인 색.
          RBR 기본 룰은 Kerb Red. 커서는 별개 — 아래 Cursor 옵션 참고.
        type: class-select
        default: rbr-accent-red
        allowEmpty: false
        options:
          - label: Kerb Red (기본)
            value: rbr-accent-red
          - label: RB Yellow
            value: rbr-accent-yellow
          - label: Chequer White
            value: rbr-accent-white
      - id: rbr-section-headings
        title: Headings
        type: heading
        level: 2
        collapsed: false
      - id: rbr-headings-choice
        title: Heading style
        description: |
          h1~h3 색상 패턴.
            Trio        : h1=accent · h2=yellow · h3=white (RBR 기본)
            Mono        : 모든 헤딩이 본문 색 (강조 최소화)
            Accent only : h1만 accent, 나머지는 본문 색
        type: class-select
        default: rbr-headings-trio
        allowEmpty: false
        options:
          - label: Trio (기본)
            value: rbr-headings-trio
          - label: Monochrome
            value: rbr-headings-mono
          - label: Accent only
            value: rbr-headings-accent-only
      - id: rbr-section-cursor
        title: Cursor
        type: heading
        level: 2
        collapsed: false
      - id: rbr-cursor-choice
        title: Cursor color
        description: |
          에디터 커서 색.
            RB Yellow  : RBR 기본 — 항상 주목 픽셀
            RB Warm    : 한 단계 덜 자극적인 따뜻한 노랑
            Follow accent : 위 Primary accent를 따라감
        type: class-select
        default: rbr-cursor-yellow
        allowEmpty: false
        options:
          - label: RB Yellow (기본)
            value: rbr-cursor-yellow
          - label: RB Warm
            value: rbr-cursor-warm
          - label: Follow accent
            value: rbr-cursor-accent
      - id: rbr-section-tab
        title: Tab indicator
        type: heading
        level: 2
        collapsed: false
      - id: rbr-tab-choice
        title: Active tab indicator
        description: |
          활성 탭 강조 방식.
            Top    : 위쪽에 accent 색 띠 (RBR 기본)
            Bottom : 아래쪽 띠
            Fill   : 탭 전체 배경에 accent 옅게 깔기
        type: class-select
        default: rbr-tab-top
        allowEmpty: false
        options:
          - label: Top border (기본)
            value: rbr-tab-top
          - label: Bottom border
            value: rbr-tab-bottom
          - label: Background fill
            value: rbr-tab-fill
      - id: rbr-section-typography
        title: Typography
        type: heading
        level: 2
        collapsed: false
      - id: rbr-code-scale
        title: Code font size
        description: 코드 블록과 인라인 코드의 폰트 크기 (em).
        type: variable-number-slider
        default: 0.92
        min: 0.8
        max: 1.1
        step: 0.01
        format: em
      - id: rbr-highlight-alpha
        title: Highlight intensity
        description: |
          ==하이라이트== 배경 alpha. 검색 매치도 같은 값을 사용.
          0.10 = 거의 안 보임, 0.60 = 강한 강조.
        type: variable-number-slider
        default: 0.3
        min: 0.1
        max: 0.6
        step: 0.05
