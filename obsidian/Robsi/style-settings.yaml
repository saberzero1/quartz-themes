mode: replace
sections:
  - name: Robsi Appearance
    id: Appearance
    collapsed: false
    settings:
      - id: colors
        title: Colors
        type: heading
        level: 1
        collapsed: true
      - id: accent
        title: Accent Color
        type: variable-themed-color
        format: hsl-split
        opacity: false
        default-light: '#0078B4'
        default-dark: '#80D0FF'
        alt-format: []
      - id: Extended-colors
        title: Extended Colors
        type: heading
        level: 2
        collapsed: true
      - id: red
        title: Red
        type: variable-themed-color
        format: rgb
        opacity: false
        default-light: rgb(180, 30, 50)
        default-dark: rgb(219, 75, 75)
        alt-format: []
      - id: red1
        title: Red1
        type: variable-themed-color
        format: rgb
        opacity: false
        default-light: rgb(200, 50, 70)
        default-dark: rgb(255, 117, 127)
        alt-format: []
      - id: green
        title: Green
        type: variable-themed-color
        format: rgb
        opacity: false
        default-light: rgb(20, 140, 80)
        default-dark: rgb(158, 206, 106)
        alt-format: []
      - id: cyan
        title: Cyan
        type: variable-themed-color
        format: rgb
        opacity: false
        default-light: rgb(0, 120, 180)
        default-dark: rgb(125, 207, 255)
        alt-format: []
      - id: blue
        title: Blue
        type: variable-themed-color
        format: rgb
        opacity: false
        default-light: rgb(30, 70, 160)
        default-dark: rgb(122, 162, 247)
        alt-format: []
      - id: yellow
        title: Yellow
        type: variable-themed-color
        format: rgb
        opacity: false
        default-light: rgb(180, 120, 0)
        default-dark: rgb(224, 175, 104)
        alt-format: []
      - id: orange
        title: Orange
        type: variable-themed-color
        format: rgb
        opacity: false
        default-light: rgb(220, 100, 20)
        default-dark: rgb(255, 158, 100)
        alt-format: []
      - id: magenta
        title: Magenta
        type: variable-themed-color
        format: rgb
        opacity: false
        default-light: rgb(160, 30, 140)
        default-dark: rgb(187, 154, 247)
        alt-format: []
      - id: pink
        title: Pink
        type: variable-themed-color
        format: rgb
        opacity: false
        default-light: rgb(200, 30, 140)
        default-dark: rgb(217, 0, 105)
        alt-format: []
      - id: lists-heading
        title: Lists
        type: heading
        level: 2
        collapsed: true
      - id: list-indent
        title: List Indent
        description: Indentation for nested list items
        type: variable-text
        default: 2em
      - id: unordered-lists-heading
        title: Unordered Lists (Bullets)
        type: heading
        level: 3
        collapsed: true
      - id: list-marker-color
        title: Bullet Color
        description: Color for list bullet markers
        type: variable-themed-color
        format: rgb
        opacity: false
        default-light: rgb(160, 30, 140)
        default-dark: rgb(187, 154, 247)
        alt-format: []
      - id: list-marker-color-hover
        title: Bullet Hover Color
        description: Color when hovering over list bullets
        type: variable-themed-color
        format: rgb
        opacity: false
        default-light: rgb(0, 120, 180)
        default-dark: rgb(125, 207, 255)
        alt-format: []
      - id: list-marker-color-collapsed
        title: Bullet Collapsed Color
        description: Color for collapsed list bullets
        type: variable-themed-color
        format: rgb
        opacity: false
        default-light: rgb(120, 125, 135)
        default-dark: rgb(86, 95, 137)
        alt-format: []
      - id: ordered-lists-heading
        title: Ordered Lists (Numbers)
        type: heading
        level: 3
        collapsed: true
      - id: list-number-color
        title: Number Color
        description: Color for ordered list numbers
        type: variable-themed-color
        format: rgb
        opacity: false
        default-light: rgb(160, 30, 140)
        default-dark: rgb(187, 154, 247)
        alt-format: []
      - id: list-number-color-hover
        title: Number Hover Color
        description: Color when hovering over list numbers
        type: variable-themed-color
        format: rgb
        opacity: false
        default-light: rgb(0, 120, 180)
        default-dark: rgb(125, 207, 255)
        alt-format: []
