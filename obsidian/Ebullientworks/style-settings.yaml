mode: replace
sections:
  - name: Ebullientworks theme settings
    id: ebullientworks-theme-16
    collapsed: false
    settings:
      - id: ebullientworks-nix-checkbox
        title: Suppress/Remove this theme's checkbox styles
        description: Set this to true if you are going to use your own task snippet
        type: class-toggle
        default: false
      - id: ebullientworks-nix-tags
        title: Suppress/Remove this theme's tag styles
        description: Set this to true if you are going to use your own tag snippet
        type: class-toggle
        default: false
      - id: ebullientworks-nix-heading-marker
        title: Suppress/Remove leading § from headings
        description: Set this to true to remove the § from headings in reading mode
        type: class-toggle
        default: false
      - id: ebullientworks-reverse-view-header-actions
        title: View header actions to the left
        description: Set this to true if the view header is visible, and you want the controls on the left side
        type: class-toggle
        default: false
      - id: ebullientworks-show-edit-mode-external-links
        title: Show external links in edit mode
        description: If true, external links (or the content of markdown links) will be shown in edit mode. External links are hidden by default.
        type: class-toggle
        default: false
      - id: ebullientworks-floating-frontmatter
        title: Float front-matter in a box to the right
        description: If true, front-matter in preview mode will be collapsed in a top-right container.
        type: class-toggle
        default: false
      - id: ebullientworks-hide-embedded-heading
        title: Hide the heading used to embed a document
        description: If true, the heading used to embed a document will be hidden.
        type: class-toggle
        default: false
      - id: ebullientworks-fonts
        title: Fonts
        type: heading
        level: 3
        collapsed: true
      - title: Headings
        description: Font for text headings (h1 to h6); empty will use default text font
        id: ebw-header-font
        type: variable-text
        default: '''Architects Daughter'''
      - title: Heading Font Caps Variant
        description: Capitalization variant for h1 text headings
        id: ebw-header-font-caps-variant
        type: variable-select
        allowEmpty: false
        default: normal
        options:
          - label: normal
            value: normal
          - label: small-caps
            value: small-caps
          - label: all-small-caps
            value: all-small-caps
          - label: all-petite-caps
            value: all-petite-caps
          - label: petite-caps
            value: petite-caps
          - label: titling-caps
            value: titling-caps
          - label: unicase
            value: unicase
          - label: inherit
            value: inherit
          - label: initial
            value: initial
          - label: unset
            value: unset
      - title: Tags
        description: Font for tags; empty will use default text font
        id: ebw-font-tags
        type: variable-text
        default: '''Architects Daughter'''
      - id: ebw-font-callout-title
        title: Callout/admonition titles
        description: Font for callout/admonition titles; empty will use default text font
        type: variable-text
        default: '''Architects Daughter'''
      - id: ebw-p-modifier
        title: Paragraph spacing modifier
        description: Gap between paragraphs (line height * this modifier)
        type: variable-number-slider
        default: 1
        min: 0.4
        max: 3
        step: 0.1
      - id: ebw-header-modifier
        title: Header spacing modifier
        description: Gap before headings (paragraph spacing * this modifier)
        type: variable-number-slider
        default: 1.4
        min: 0.8
        max: 3
        step: 0.1
      - id: other-font-settings
        title: Use Appearance to customize text/monospace fonts
        description: (This has no effect. ;) )
        type: class-toggle
        default: false
      - id: ebullientworks-colors
        title: Colors
        type: heading
        level: 3
        collapsed: true
      - title: Primary accent color
        id: ebullientworks-primary-accent
        description: Choose the primary accent color. You must define a snippet if you select primary-accent-custom. See the Theme's README.
        type: class-select
        allowEmpty: false
        default: primary-accent-purple
        options:
          - label: primary-accent-purple
            value: primary-accent-purple
          - label: primary-accent-pink
            value: primary-accent-pink
          - label: primary-accent-red
            value: primary-accent-red
          - label: primary-accent-orange
            value: primary-accent-orange
          - label: primary-accent-green
            value: primary-accent-green
          - label: primary-accent-cyan
            value: primary-accent-cyan
          - label: primary-accent-blue
            value: primary-accent-blue
          - label: primary-accent-custom
            value: primary-accent-custom
      - title: Secondary accent color
        id: ebullientworks-secondary-accent
        description: Choose the secondary accent color. You must define a snippet if you select secondary-accent-custom. See the Theme's README.
        type: class-select
        allowEmpty: false
        default: secondary-accent-green
        options:
          - label: secondary-accent-purple
            value: secondary-accent-purple
          - label: secondary-accent-pink
            value: secondary-accent-pink
          - label: secondary-accent-red
            value: secondary-accent-red
          - label: secondary-accent-orange
            value: secondary-accent-orange
          - label: secondary-accent-green
            value: secondary-accent-green
          - label: secondary-accent-cyan
            value: secondary-accent-cyan
          - label: secondary-accent-blue
            value: secondary-accent-blue
          - label: secondary-accent-custom
            value: secondary-accent-custom
