- name: 🎨 Retroma Theme
  id: retroma-obsidian-theme
  settings:
    - id: theme-font-selection
      title: Theme Font Selection
      description: Fonts that complement the theme.
      type: class-select
      default: default
      options:
        - label: Default
          value: default
        - label: W95font
          value: retroma-font-w95font
        - label: Cascadia Code
          value: retroma-font-cascadia-code
        - label: iA Writer Mono
          value: retroma-font-ia-writer-mono
        - label: Excalifont
          value: retroma-font-excalifont
    - id: theme-color-scheme-selection
      title: Theme Color Scheme Selection
      type: class-select
      description: For this to work correctly, you must first reset any modifications previously applied to the Main and Minor Accents within the Color Scheme Tuner (advance).
      allowEmpty: false
      default: Analogous
      options:
        - label: Analogous (Default)
          value: Analogous
        - label: Analogous (Reversed)
          value: cs-analogous-colors-reversed
        - label: Split Complementary
          value: cs-split-complementary-colors
        - label: Split Complementary (Reversed)
          value: cs-split-complementary-colors-reversed
        - label: Triadic
          value: cs-triadic-colors
        - label: Triadic (Reversed)
          value: cs-triadic-colors-reversed
        - label: Monochromatic
          value: cs-monochromatic-colors
        - label: Monochromatic (Reversed)
          value: cs-monochromatic-colors-reversed
    - id: theme-variant
      title: Theme Variant Selection
      type: class-select
      allowEmpty: false
      default: Groovy
      options:
        - label: Groovy (Default)
          value: Groovy
        - label: Simple
          value: theme-variant-1
        - label: Minimalist
          value: theme-variant-2
    - id: window-border-radius
      title: Theme Border Radius
      type: variable-select
      format: px
      default: 12px
      options:
        - label: Extra Large
          value: 18px
        - label: Large (Default)
          value: 12px
        - label: Medium
          value: 6px
        - label: Sharp
          value: 0px
    - id: button-border-radius
      title: Button Border Radius
      type: variable-select
      format: px
      default: 8px
      options:
        - label: Extra Large
          value: 24px
        - label: Large (Default)
          value: 8px
        - label: Medium
          value: 6px
        - label: Sharp
          value: 0px
    - id: lightness-accent
      title: Dark Mode Lightness
      type: variable-number-slider
      default: 0.24
      min: 0
      max: 0.32
      step: 0.02
    - id: color-scheme
      title: 🎨 Color Scheme Tuner (advance)
      type: heading
      level: 2
      collapsed: true
    - id: interactive-accent
      title: Accent Color
      description: Your preferred accent color in light and dark mode. Click reset buttons if you want to use Obsidian's default accent color found in the Appearance category in Settings.
      type: variable-themed-color
      format: hex
      opacity: false
      default-light: '#'
      default-dark: '#'
    - id: rotation-2
      title: Main Accents
      type: variable-number-slider
      description: To use the Theme Color Scheme Selection, SPAM CLICK reset button 3 times.
      default: 330
      min: 0
      max: 360
      step: 1
    - id: rotation-1
      title: Minor Accents
      description: To use the Theme Color Scheme Selection, SPAM CLICK reset button 3 times.
      type: variable-number-slider
      default: 30
      min: 0
      max: 360
      step: 1
    - id: typography
      title: 🔤 Typography Tuner (advance)
      type: heading
      level: 2
      collapsed: true
    - id: chroma
      title: Typography Chroma/Saturation
      description: This setting may be ignored if you have applied any manual customizations below.
      type: variable-number-slider
      default: 0.1
      min: 0
      max: 0.2
      step: 0.001
    - id: heading-colors
      title: Heading Colors
      type: heading
      level: 3
      collapsed: true
