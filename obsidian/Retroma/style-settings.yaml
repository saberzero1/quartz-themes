    - id: misc
      title: ⚙️ Miscellaneous
      type: heading
      level: 2
      collapsed: true
    - id: enable-alternative-checkboxes
      title: Enable Alternative Checkboxes
      description: Disable this if you are using your own implementation via a CSS Snippet.
      default: true
      type: class-toggle
    - id: disable-checklist-done-decoration
      title: Disable strikethrough on completed checklists.
      default: false
      type: class-toggle
    - id: heading-divider
      title: Heading Divider
      type: class-select
      allowEmpty: false
      default: heading-divider-hide
      options:
        - label: Hide (Default)
          value: heading-divider-hide
        - label: Show
          value: heading-divider-show
    - id: footnote-divider
      title: Footnote Divider
      type: class-select
      allowEmpty: false
      default: footnote-divider
      options:
        - label: Hide (Default)
          value: footnote-divider
        - label: Show
          value: null
    - id: text-alignment
      title: Text Alignment
      type: class-select
      allowEmpty: false
      default: Left
      options:
        - label: Left (Default)
          value: Left
        - label: Justify
          value: text-justify
        - label: Center
          value: text-center
        - label: Right
          value: text-right
    - id: plugin-integration-toggle
      title: 🧪 Plugin Integrations Toggle
      type: heading
      level: 2
      collapsed: true
    - id: retroma-with-tasknotes-plugin
      title: TaskNotes by Callum Alpass
      type: class-select
      description: https://github.com/callumalpass/tasknotes
      allowEmpty: false
      default: retroma-with-tasknotes-plugin
      options:
        - label: Enable
          value: retroma-with-tasknotes-plugin
        - label: Disable
          value: null
    - id: retroma-with-kanban-plugin
      title: Kanban by mgmeyers
      type: class-select
      description: https://github.com/mgmeyers/obsidian-kanban
      allowEmpty: false
      default: retroma-with-kanban-plugin
      options:
        - label: Enable
          value: retroma-with-kanban-plugin
        - label: Disable
          value: null
    - id: retroma-with-calendar-plugin
      title: Calendar by Liam Cain
      type: class-select
      description: https://github.com/liamcain/obsidian-calendar-plugin
      allowEmpty: false
      default: retroma-with-calendar-plugin
      options:
        - label: Enable
          value: retroma-with-calendar-plugin
        - label: Disable
          value: null
