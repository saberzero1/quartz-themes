mode: replace
sections:
  - name: Oreo Theme 🍪
    id: oreo-theme
    collapsed: false
    settings:
      - id: general-settings
        title: General Settings ⚙
        title.zh: 常规设置 ⚙
        type: heading
        level: 2
        collapsed: true
      - id: button-radius
        title: Button Radius
        title.zh: 按钮圆角半径
        type: variable-number
        default: 10
        format: px
      - id: checkbox-radius
        title: Checkbox Radius
        title.zh: 复选框圆角半径
        type: variable-number
        default: 50
        format: '%'
      - id: checkbox-size
        title: Checkbox Size
        title.zh: 复选框大小
        type: variable-number
        default: 16
        format: px
      - id: checkbox-margin-inline-start
        title: Checkbox Margin Inline Start
        title.zh: 复选框起始内边距
        type: variable-number
        default: 8
        format: px
      - id: popover-width
        title: Popover Width
        title.zh: 弹出框宽度
        type: variable-number
        default: 300
        format: px
      - id: popover-height
        title: Popover Height
        title.zh: 弹出框高度
        type: variable-text
        default: auto
      - id: popover-max-height
