        collapsed: true
      - id: link-decoration
        title: Link Decoration
        title.zh: 链接装饰
        type: variable-select
        default: underline
        options:
          - label: none
            value: none
          - label: underline
            value: underline
      - id: link-decoration-hover
        title: Link Hover Decoration
        title.zh: 链接悬停装饰
        type: variable-select
        default: underline
        options:
          - label: none
            value: none
          - label: underline
            value: underline
