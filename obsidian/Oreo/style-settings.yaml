        title: Link Decoration Thickness
        title.zh: 链接装饰厚度
        type: variable-number
        default: 1
        format: px
      - id: link-weight
        title: Link Weight
        title.zh: 链接粗细
        type: variable-select
        default: normal
        options:
          - label: normal
            value: normal
          - label: bold
            value: bold
      - id: link-unresolved-opacity
        title: Unresolved Link Opacity
        title.zh: 未解析链接不透明度
        type: variable-number
        default: 0.7
      - id: link-unresolved-filter
        title: Unresolved Link Filter
        title.zh: 未解析链接滤镜
        type: variable-text
        default: brightness(0.8)
      - id: link-unresolved-decoration-style
        title: Unresolved Link Decoration Style
        title.zh: 未解析链接装饰样式
        type: variable-select
        default: dashed
        options:
          - label: none
            value: none
          - label: underline
            value: underline
          - label: dashed
            value: dashed
          - label: dotted
            value: dotted
      - id: link-external-decoration
        title: External Link Decoration
        title.zh: 外部链接装饰
