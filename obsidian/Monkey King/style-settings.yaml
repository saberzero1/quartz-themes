mode: replace
sections:
  - name: Monkey King Theme
    id: monkey-king-theme
    collapsed: false
    settings:
      - id: h-sec-stage
        title: 短诗定场
        title.en: Prologue in Verse
        description: 仙山灵石，久孕猿猴，碎开新篇。
        description.en: From immortal stone on cloud-hid peaks, a monkey is born; a new chapter cracks open.
        type: heading
        level: 1
        collapsed: false
      - id: h-group-fontpack-preview
        title: 字体预览
        title.en: Font Preview
        type: heading
        level: 2
        collapsed: false
      - id: h-note-fontpack-quick
        title: 必读：预设字体
        title.en: 'Read First: Preset Fonts'
        type: info-text
        markdown: true
        description: 本主题搭配了多款免费字体，预设字体缺失会**明显影响观感**。请先下载安装字体包：[主链Github](https://github.com/LeapSurge/Monkey-King/releases/latest/download/font-pack-open.zip) ｜ [备用123网盘](https://www.123865.com/s/b62hTd-lg8Hv)。安装后建议*重启 Obsidian*。
        description.en: 'This theme is paired with several free fonts. Missing preset fonts will **noticeably weaken the look**. Download and install the font pack first: [GitHub main link](https://github.com/LeapSurge/Monkey-King/releases/latest/download/font-pack-open.zip) | [123 Cloud mirror](https://www.123865.com/s/b62hTd-lg8Hv). After installing, *restart Obsidian*.'
      - id: h-note-mode-huaguo
        title: 一条涧壑藤萝密，四面原堤草色新。
        title.en: Ravines twined with vines; fresh grass circling every bank.
        type: info-text
      - id: h-note-mode-hall
        title: 金钉攒玉户，彩凤舞朱门。
        title.en: Golden studs gather at jade doors; painted phoenixes dance before vermilion gates.
        type: info-text
      - id: h-group-stage-controls
        title: 登场设定
        title.en: Stage Setup
        type: heading
        level: 2
        collapsed: false
      - id: u-font-theme-zh
        title: ③ 念白开场
        title.en: 3. Open with a Monologue
        description: 最后确定正文的字体
        description.en: Finally, choose the voice of the main text.
        type: variable-select
        default: initial
        options:
          - label: 顺应场景 · Auto
            value: initial
          - label: 黑体 · Hei
            value: var(--stack-hei)
          - label: 宋体 · Song
            value: var(--stack-song)
          - label: 楷体 · Kai
            value: var(--stack-kai)
          - label: 仿宋 · Fangsong
            value: var(--stack-fang)
      - id: h-sec-optimize
        title: 看桃放马
        title.en: Tending Peaches, Grazing Horses
        description: 恭恭敬敬，规规矩矩，小打小闹。
        description.en: 'Respectful, orderly, and gentle: small adjustments before the riot.'
        type: heading
        level: 1
        collapsed: true
      - id: bg-tune-override
        title: 亲调天光
        title.en: Tune the Sky by Hand
        type: class-toggle
        default: false
        description: 关闭时跟随默认背景；开启后使用滑块微调背景。
        description.en: 'Off: follow the default background. On: use the slider below to temper the light.'
      - id: u-bg-tune
        title: 天光偏移
        title.en: Skylight Offset
        type: variable-number-slider
        default: 0
        min: -20
        max: 20
        step: 1
        description: 微调背景与文字的对比度，0 为不偏移。
        description.en: Fine-tune the contrast between background and text. 0 means no offset.
      - id: h-sec-advance
        title: 大闹天宫
        title.en: Havoc in Heaven
        type: heading
        level: 1
        collapsed: true
        description: 踢丹炉，碎金匾，铁棒到处生烟。
        description.en: Kicking over the elixir furnace, shattering golden plaques; smoke rises wherever the iron staff falls.
      - id: h-group-editor
        title: 编辑器
        title.en: Editor
        type: heading
        level: 2
        collapsed: true
      - id: h-note-limitation
        title: 注意
        title.en: Note
        type: info-text
        description: 目前只实现了对元素的字体调整。
        description.en: For now, only element-level font adjustments are implemented.
      - id: h-note-fontpack-advanced
        title: 预设字库下载
        title.en: Preset Font Download
        type: info-text
        markdown: true
        description: 若风格与预期不符，请先安装预设字体包：[主链Github](https://github.com/LeapSurge/Monkey-King/releases/latest/download/font-pack-open.zip) ｜ [备用123网盘](https://www.123865.com/s/b62hTd-lg8Hv) 。
        description.en: 'If the style does not look as intended, install the preset font pack first: [GitHub main link](https://github.com/LeapSurge/Monkey-King/releases/latest/download/font-pack-open.zip) | [123 Cloud mirror](https://www.123865.com/s/b62hTd-lg8Hv).'
      - id: h-group-font-base
        title: 正文与代码
        title.en: Body & Code
        type: heading
        level: 3
        collapsed: true
      - id: cancel-font-override
        title: 回归原本
        title.en: Return to the Original
        type: class-toggle
        default: false
        description: 关闭：在style-setting设置正文和代码字体。开启：改用你在设置面板中设置的字体。
        description.en: 'Off: set body and code fonts in Style Settings. On: use the fonts from Obsidian''s Appearance settings instead.'
      - id: h-sub-font-theme
        title: 正文
        title.en: Body Text
        type: heading
        level: 4
        collapsed: true
      - id: u-font-theme-west
        title: 正文西文
        title.en: Body Latin
        type: variable-select
        default: initial
        options:
          - label: 顺应场景 · Auto
            value: initial
          - label: 衬线 · Serif
            value: var(--stack-serif)
          - label: 非衬线 · Sans
            value: var(--stack-sans)
          - label: 手写体 · Hand
            value: var(--stack-hand)
          - label: 系统衬线斜体 · Serif Italic
            value: var(--stack-serif-i)
          - label: 系统非衬线斜体 · Sans Italic
            value: var(--stack-sans-i)
      - id: font-stack-override-theme
        title: 自定义字体栈
        title.en: Custom Font Stack
        type: class-toggle
        default: false
        description: 开启后使用下方文本框覆盖“西文 + 中文”组合。
        description.en: When enabled, the field below overrides the "Latin + Chinese" pairing.
      - id: u-font-stack-theme
        title: 字体栈（CSS）
        title.en: Font Stack (CSS)
        type: variable-text
