      collapsed: true
      level: 3
    - id: CTA-BTN-enable
      title: Enable bigger "New note" button
      type: class-toggle
    - id: file-names-untrim
      title: Untrim file names
      type: class-toggle
    - id: folder-font-bold
      title: Bold folder font
