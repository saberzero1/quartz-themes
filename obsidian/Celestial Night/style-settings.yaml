mode: replace
sections:
  - name: Celestial Night
    id: celestial-night-theme
    collapsed: false
    settings:
      - id: font-text-theme
        title: Main (Body) Font
        type: variable-select
        default: var(--font-serif)
        options:
          - label: Serif
            value: var(--font-serif)
          - label: Sans
            value: var(--font-sans)
          - label: Cursive
            value: var(--font-cursive)
      - id: heading-font
        title: Heading Font
        type: variable-select
        default: var(--font-cursive)
        options:
          - label: Serif
            value: var(--font-serif)
          - label: Sans
            value: var(--font-sans)
          - label: Cursive
            value: var(--font-cursive)
