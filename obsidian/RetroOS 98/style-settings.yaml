  - name: RetroOS 98 Support
    id: CG-Support
    collapsed: false
    settings:
      - id: ROS09-github
        title: Have a suggestion or found a problem with the theme
        description: Submit an issue on [Github](https://github.com/ThePharaohArt/Obsidian-RetroOS98/issues)
        type: info-text
        markdown: true
      - id: ROS09-more-themes
        title: My Other themes
        description: Check out my other themes:[Cyber Glow](https://github.com/ThePharaohArt/Obsidian-CyberGlow)
