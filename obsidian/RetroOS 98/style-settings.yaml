mode: replace
sections:
  - name: RetroOS 98 Tweak Box
    id: ROS98-Support
    collapsed: false
    settings:
      - id: scrollbar-width
        title: Background brightness
        description: Suggestion Increase brightness on Dark mode, decrease brightness on light mode.
        type: variable-number-slider
        min: 11
        max: 18
        step: 0.5
        default: 18
        format: px
      - id: ROS09-darkScheme
        description: Change color scheme for the dark theme. "+" means its from the Windows Plus pack
        title: Dark Color Scheme
        type: class-select
        allowEmpty: false
        default: ROS98
        options:
          - label: RetroOS 98 Dark
            value: ROS98
          - label: Ancient Pathways +
            value: ROS98-Ancient
          - label: Dangerous Creatures +
            value: ROS98-DC
          - label: Jungle +
            value: ROS98-Jungle
          - label: Mystery +
            value: ROS98-mystery
          - label: Travel +
            value: ROS98-Travel
          - label: Snowboarding +
            value: ROS98-Snow
          - label: Space +
            value: ROS98-Space
          - label: Steam
            value: ROS98-steam
          - label: Under Water +
            value: ROS98-Water
      - id: ROS09-lightScheme
        description: Change color scheme for the light theme. "+" means its from the Windows Plus pack
        title: Light Color Scheme
        type: class-select
        allowEmpty: false
        default: ROS98
        options:
          - label: RetroOS 98 Light
            value: ROS98
          - label: Baseball
            value: ROS98-baseball
