mode: replace
sections:
  - name: Iridium
    id: iridium
    collapsed: false
    settings:
      - id: layout
        title: Layout
        type: heading
        level: 1
        collapsed: true
      - id: i-card-radius
        title: 'Card layout: Radius (px)'
        type: variable-number-slider
        default: 8
        min: 0
        max: 12
        step: 1
        format: px
      - id: light-mode
        title: Light mode
        type: heading
        level: 1
        collapsed: true
      - id: i-lt-s
        title: Saturation (%)
        type: variable-number-slider
        default: 25
        min: 0
        max: 100
        step: 1
        format: '%'
      - id: i-lt-l-multiplier
        title: Lightness multiplier
        type: variable-number-slider
        default: 1
        min: 0.5
        max: 1.5
        step: 0.05
      - id: i-lt-border-l
        title: Editor border lightness (%)
        description: Border lightness of elements in the editor (tables, code blocks, embeds, horizontal rules, etc).
        type: variable-number-slider
        default: 14
        min: 5
        max: 25
        step: 1
        format: '%'
      - id: i-lt-default-text-accent
        title: Default accent text color
        description: Use the default accent text color for links, file path, accent colored inline title, etc.
        type: class-toggle
      - id: light-mode-card-and-border-layouts
        title: Card and border layouts
        type: heading
        level: 2
      - id: i-lt-layout-s
        title: Enable custom border saturation
        type: class-toggle
      - id: i-lt-custom-layout-s
        title: Custom border saturation (%)
        type: variable-number-slider
        default: 25
        min: 0
        max: 100
        step: 1
        format: '%'
      - id: i-lt-layout-l
        title: Border lightness (%)
        type: variable-number-slider
        default: 12
        min: 0
        max: 25
        step: 1
        format: '%'
      - id: i-lt-layout-border-l
        title: Pane outline lightness (%)
        type: variable-number-slider
        default: 8
        min: 0
        max: 25
        step: 1
        format: '%'
      - id: dark-mode
        title: Dark mode
        type: heading
        level: 1
        collapsed: true
      - id: i-dk-s
        title: Saturation (%)
        type: variable-number-slider
        default: 12
        min: 0
        max: 25
        step: 1
        format: '%'
      - id: i-dk-l
        title: Lightness (%)
        type: variable-number-slider
        default: 12
        min: 0
        max: 25
        step: 1
        format: '%'
      - id: i-dk-l-multiplier
        title: Lightness multiplier
        type: variable-number-slider
        default: 1
        min: 0.5
        max: 1.5
        step: 0.05
      - id: i-dk-border-l
        title: Editor border lightness (%)
        description: Border lightness of elements in the editor (tables, code blocks, embeds, horizontal rules, etc).
        type: variable-number-slider
        default: 11
        min: 5
        max: 25
        step: 1
        format: '%'
      - id: i-dk-text-l-multiplier
        title: Text lightness multiplier
        type: variable-number-slider
        default: 1
        min: 0.7
        max: 1.4
        step: 0.05
      - id: i-dk-default-text-accent
        title: Default accent text color
        description: Use the default accent text color for links, file path, accent colored inline title, etc.
        type: class-toggle
      - id: dark-mode-card-and-border-layouts
        title: Card and border layouts
        type: heading
        level: 2
      - id: i-dk-layout-s
        title: Enable custom border saturation
        type: class-toggle
      - id: i-dk-custom-layout-s
        title: Custom border saturation (%)
        type: variable-number-slider
        default: 12
        min: 0
        max: 100
        step: 1
        format: '%'
      - id: i-dk-layout-l
        title: Border lightness (%)
        type: variable-number-slider
        default: 8
        min: 0
        max: 25
        step: 1
        format: '%'
      - id: i-dk-layout-border-l
        title: Pane outline lightness (%)
        type: variable-number-slider
        default: 8
        min: 0
        max: 25
        step: 1
        format: '%'
      - id: editor
        title: Editor
        type: heading
        level: 1
        collapsed: true
      - id: active-line-highlight
        title: Active line highlight
        type: heading
        level: 2
        collapsed: true
      - id: active-line-highlight-style
        title: Active line highlight style (desktop only)
        type: class-select
        allowEmpty: true
        default: none
        options:
          - label: Border
            value: i-active-line-border
          - label: Highlight
            value: i-active-line-highlight
          - label: Highlight + border
            value: i-active-line-highlight-border
      - id: i-active-line-active-pane-only
        title: Only show in active pane
        type: class-toggle
        default: true
      - id: i-active-line-color
        title: Active line highlight color
        type: variable-themed-color
        format: hex
        default-light: '#'
        default-dark: '#'
        alt-format: []
      - id: blockquotes
        title: Blockquotes
        type: heading
        level: 2
        collapsed: true
      - id: i-italic-blockquote-text
        title: Italic blockquote text
        type: class-toggle
      - id: i-transparent-blockquote-background
