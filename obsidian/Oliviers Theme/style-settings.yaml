        description: 'Hide the Bases toolbar/header in note Preview. Use cssclasses: bases-header-on in a note to temporarily show it again.'
        description.fr: 'Cache la barre d’outils/en-tête des Bases en mode Lecture. Utiliser cssclasses: bases-header-on dans une note pour la réafficher ponctuellement.'
