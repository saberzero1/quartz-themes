mode: replace
sections:
  - name: Olivier’s Theme
    id: Olivier-s-Theme
    collapsed: false
    settings:
      - id: OT-general-settings
        title: GENERAL settings
        title.fr: Réglages GÉNÉRAUX
        title.en: GENERAL SETTINGS
        type: heading
        level: 2
        collapsed: true
        description: Main settings for the interface, general typography and kanban boards.
        description.fr: Les réglages principaux pour l’interface, la typographie en général et les kanbans.
      - id: OT-UI-settings
        title: Interface
        title.fr: Interface
        type: heading
        level: 3
        collapsed: true
        description: Basic interface tweaks.
        description.fr: Réglages de base de l’interface.
      - id: OT-UI-font-size
        title: Base size for the interface texts [px]
        title.fr: Taille de base pour les caractères de l’interface [px]
        type: variable-number
        default: 16
        format: px
      - id: OT-filesNavigator-spacing
        title: Spacing for items in sidepanels and settings panel
        title.fr: Espacement des listes dans les panneaux latéraux et le panneau des settings.
        type: class-select
        allowEmpty: false
        default: filesNavigator-spacing-medium
        options:
          - label: Tight
            value: filesNavigator-spacing-compact
          - label: Medium
            value: filesNavigator-spacing-medium
          - label: Wide
            value: filesNavigator-spacing-loose
          - label: Very wide
            value: filesNavigator-spacing-veryLoose
      - id: OT-viewing-mode-icons
        title: Viewing mode icon as a true status indicator
        title.fr: L’icône du mode indique le status
        description: 'ON: The indicator on the right of the pane title bar becomes a true mode indicator (Reading / Live Preview / Raw Source). Switch OFF if you prefer the default Obsidian behaviour.'
        description.fr: 'ON: l’icône d’état du panneau courant, à droite de la barre de titre, indique le mode actuel (Lecture / Live Preview / Source). Mettre à OFF pour avoir le comportement par défaut d’Obsidian.'
        type: class-toggle
        default: true
        addCommand: true
      - id: OT-tab-title-highlighted
        title: Highlight current tab
        title.fr: Tab courant mis en évidence
        description: Highlight the name of the current note in the tab title.
        description.fr: Met en évidence sur le tab le nom de la fiche courante.
        type: class-toggle
        default: false
        addCommand: true
      - id: OT-suppress-title-bar-breadcrumb
        title: Hide Title Bar breadcrumb
        title.fr: Masquer le Fil d’Ariane dans la barre de titre
        description: Optionally, hide the breadcrumb in the title bar.
        description.fr: 'Option: Masquer le “breadcrumb” dans la barre de titre.'
        type: class-toggle
        default: false
        addCommand: true
      - id: OT-status-bar-padding
        title: Status Bar padding [px]
        title.fr: Marges de la barre d’état [px]
        description: Number of pixels between the status bar and the window border.
        description.fr: Nombre de pixels entre la “Status Bar” et le bord de la fenêtre.
        type: variable-number
        default: 6
        format: px
      - id: OT-metadata-label-width
        title: Width of the properties labels [em]
        title.fr: Largeur des noms des champs des propriétés [em]
        type: variable-number
        default: 7
        format: em
      - id: OT-embed-hide-title
        title: Hide embed titles
        title.fr: Masquer le titre des transclusions
        description: Hide the file name at the top of embedded notes and queries.
        description.fr: Masque le nom du fichier en haut des notes et requêtes incluses.
        type: class-toggle
        default: true
        addCommand: true
      - id: OT-canvas-dot-pattern-hidden
        title: Hide canvas dot pattern
        title.fr: Cacher les points en fond des canvas
        description: Hide the dotted background pattern on canvases.
        description.fr: Masquer le motif de points du fond des canvases.
        type: class-toggle
        default: false
        addCommand: true
      - id: OT-typography-settings
        title: Typography
        title.fr: Typographie
        type: heading
        level: 3
        collapsed: true
        description: Typography settings for all modes.
        description.fr: Réglage typographiques pour tous les modes.
      - id: OT-headings-scaling
        title: Headings and subheadings scaling
        title.fr: Accroissement des titres et intertitres
        description: Different ways of increasing the size of headings from H6 to H1. By default, a choice “generous but not too much”.
        description.fr: Différentes façons de grader la taille des H1 à H6. Par défaut, un choix généreux, mais pas trop.
        type: class-select
        allowEmpty: false
        default: headings-scaling-OpSpl
        options:
          - label: None
            value: headings-scaling-none
          - label: Bear style
            value: headings-scaling-Bear
          - label: Slowly
            value: headings-scaling-slight
          - label: Minor second
            value: headings-scaling-minor-second
          - label: Major second
            value: headings-scaling-major-second
          - label: Olivier’s
            value: headings-scaling-OpSpl
          - label: Minor third
            value: headings-scaling-minor-third
          - label: Major third
            value: headings-scaling-major-third
      - id: OT-vertical-rythm
        title: Typographical vertical rythm
        title.fr: Rythme typographique vertical
        description: Vertical white space around headings and paragraphs.
        description.fr: Blanc typographique au-dessus et au-dessous des titres, intertitres et paragraphes.
        type: class-select
        allowEmpty: false
        default: vertical-rythm-normal
        options:
          - label: Tight
            value: vertical-rythm-tight
          - label: Normal
            value: vertical-rythm-normal
          - label: Generous
            value: vertical-rythm-generous
          - label: Bear
            value: vertical-rythm-Bear
      - id: OT-lists-font-stepdown
        title: 'Lists: Text size stepping down'
        title.fr: 'Listes : taille de texte décroissante'
        description: Use smaller text for deeper list levels.
        description.fr: Utiliser un texte plus petit pour les niveaux de liste plus profonds.
        type: class-toggle
        default: false
        addCommand: true
      - id: OT-lists-vert-spacing
        title: 'Lists: vertical spacing, line spacing'
        title.fr: 'Listes : espacement vertical, interligne'
        description: 'Control vertical spacing inside lists: normal / tight.'
        description.fr: 'Contrôler l’espacement vertical à l’intérieur des listes : normal / serré.'
        type: class-select
        allowEmpty: false
        default: lists-vert-normal
        options:
          - label: Normal
            value: lists-vert-normal
          - label: Tight
            value: lists-vert-tight
      - id: OT-lists-horiz-indenting
        title: 'Lists: Indenting'
        title.fr: 'Listes : indentation'
        description: 'Control horizontal indentation and bullet gap: normal / wide / generous.'
        description.fr: 'Contrôler l’indentation horizontale et l’écart puce–texte : normale / large / généreuse.'
        type: class-select
        allowEmpty: false
        default: lists-horiz-normal
        options:
          - label: Normal
            value: lists-horiz-normal
          - label: Wide
            value: lists-horiz-wide
          - label: Generous
            value: lists-horiz-generous
      - id: OT-separators-style
        title: Text separators
        title.fr: Séparateurs de texte
        description: Choose the ornamental separator used for Markdown horizontal rules.
        description.fr: Choisir le séparateur ornemental utilisé pour les règles horizontales Markdown.
        type: class-select
        allowEmpty: false
        default: OT-sep-asterism
        options:
          - label: Asterism
            value: OT-sep-asterism
          - label: Diamond
            value: OT-sep-diamond
          - label: Fleuron
            value: OT-sep-fleuron
      - id: OT-codeblock-linewrap-OFF
        title: Suppress line wrapping within code blocks
        title.fr: Supprimer les retours à la ligne dans les blocs de code
        type: class-toggle
        default: true
        addCommand: true
      - id: OT-kanban-settings
        title: Kanbans (plugin + Board View)
        type: heading
        level: 3
        collapsed: true
        description: Kanbans oriented settings.
        description.fr: Réglages pour les kanbans
      - id: OT-kanban-font
