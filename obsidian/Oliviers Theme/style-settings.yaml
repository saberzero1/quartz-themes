      - id: OT-READING-mode-settings
        title: READING mode
        title.fr: Mode «LECTURE / CONSULTATION»
        description: Adjustments for the comfort of reading. Table styles. Bases. Images.
        type: heading
        level: 2
        collapsed: true
      - id: OT-readingMode-text-size
        title: Body text size [px]
        title.fr: Taille des caractères [px]
        type: variable-number
        default: 17
        format: px
      - id: OT-readingMode-natural-line-height
        title: Natural line height for the chosen font (Reading)
        title.fr: Interligne naturel pour la fonte choisie (en lecture)
        description: When ON, Reading mode uses more or less the line-height intended by the font designer and the following value is ignored.
        description.fr: ON signifie que l’interligne sera plus ou moins celui prévu par le créateur de la fonte et la valeur ci-dessous est ignorée.
        type: class-toggle
        default: false
        addCommand: true
      - id: OT-readingMode-line-height
        title: Line height [em]
        title.fr: Interligne [em]
        type: variable-number
        default: 1.5
        format: em
        disableIF:
          - OT-readingMode-natural-line-height
      - id: OT-readingMode-line-width
        title: Line length [em]
        title.fr: Longueur de la ligne [em]
        type: variable-number
        default: 44
        format: em
      - id: OT-readingMode-tableText-percent
        title: "Size of the text in table cells (%\_of\_body\_text\_size). 100\_=\_same\_size"
        title.fr: "Taille des caractères dans les tables, en pourcents du texte normal. 100\_=\_même\_taille"
        description: It’s generally practical to have a smaller text size inside table cells.
        type: variable-number
        default: 90
