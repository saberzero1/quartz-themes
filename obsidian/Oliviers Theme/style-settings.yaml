        title.fr: 'Kanban : Fonte'
        description: It may be nice to choose a different font for the Kanban. Why not a font mimicking handwriting?
        description.fr: Il peut être intéressant de choisir une fonte différente pour le Kanban, par exemple une écriture manuscrite.
