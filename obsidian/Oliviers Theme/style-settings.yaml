    - id: OT-edit-text-size
      title: Body text size [px]
      title.fr: Taille des caractères [px]
      type: variable-number
      default: 17
      format: px
    - id: OT-edit-natural-line-height
      title: Natural line height for the chosen font (Edit mode)
      title.fr: Interligne naturel pour la fonte choisie (en écriture)
      description: When ON, Editing mode uses more or less the line-height intended by the font designer and the following value is ignored.
      description.fr: ON signifie qu’en écriture, l’interligne sera plus ou moins celui prévu par le créateur de la fonte et la valeur ci-dessous est ignorée.
      type: class-toggle
      default: false
      addCommand: true
    - id: OT-edit-line-height
      title: Line height [em]
      title.fr: Interligne [em]
      type: variable-number
      default: 1.5
      format: em
    - id: OT-edit-line-width
      title: Line length [em]
      title.fr: Longueur de la ligne [em]
      description: By default, you get longer lines than plain Obsidian.
      description.fr: Par défaut, une valeur un peu plus généreuse que le « défaut » d’Obsidian.
      type: variable-number
      default: 44
      format: em
    - id: OT-edit-table-text-percent
      title: "Size of the text in table cells (%\_of\_body\_text\_size). 100\_=\_same\_size"
      title.fr: "Taille des caractères dans les tables, en pourcents du texte normal. 100\_=\_même taille"
      description: It’s generally practical to have a smaller text size inside table cells.
      type: variable-number
      default: 90
    - id: OT-table-cell-edit-size-lock
      title: While editing a table, the chosen text size sticks.
      title.fr: En mode Live editing, la taille du texte des cellules ne change pas.
      description: "OFF ⭢\_When editing a table cell in Live mode, the text size changes to body text size."
      description.fr: "OFF ⭢\_En mode Live editing, le texte de la cellule courante prend la taille du texte normal."
      type: class-toggle
      default: true
      addCommand: true
    - id: OT-img-max-height-live
      title: Images max height in Live Preview [in pixels]
      title.fr: Hauteur maximale des images en “Live Preview” [en pixels]
      type: variable-number
      default: 150
      format: px
