mode: replace
sections:
  - name: Pxld
    id: pxld-theme
    collapsed: false
    settings:
      - id: my-title
        title: Theme Settings
        type: heading
        level: 3
      - id: interactive-accent
        title: Accent Color
        type: variable-color
        format: hex
        default: '#ff0000'
        alt-format: []
      - id: text-accent-hover
        title: Accent Hover Color
        type: variable-color
        format: hex
        default: '#5e0b11'
        alt-format: []
      - id: font-text
        title: Base Font
        type: variable-text
        default: Pixel Square
