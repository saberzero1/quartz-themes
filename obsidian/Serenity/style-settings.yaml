mode: replace
sections:
  - name: Serenity
    id: serenity-theme
    collapsed: false
    settings:
      - id: colors-heading
        title: Colors
        type: heading
        level: 2
        collapsed: true
      - id: color-scheme-select
        title: Color Scheme
        type: class-select
        allowEmpty: false
        default: theme-normal
        options:
          - label: Obsidian
            value: theme-normal
          - label: Ayu
            value: theme-ayu-s
          - label: Catppuccin
            value: theme-catpp
          - label: Nord
            value: theme-nord-s
          - label: Solarized
            value: theme-solarized-s
          - label: Rose Pine
            value: theme-rose-pine
          - label: Everforest
            value: theme-everforest
          - label: Gruvbox
            value: theme-gruvbox-s
      - title: Flat Color Mode
        id: flat-mode
        description: Make the appearance flat and less colorful. Optimal for hiding elements and increasing focus!
        type: class-toggle
        default: true
      - id: advanced-heading
        title: Advanced
        type: heading
        level: 3
        collapsed: true
      - id: custom-color-scheme-heading-light
        title: Custom Light Theme
        type: heading
        level: 4
        collapsed: true
      - id: custom-color-scheme-light
        title: Use Custom Light Theme
        type: class-toggle
        default: false
      - id: custom-theme-tint-l
        title: Base Tint
        type: variable-number-slider
        min: 0
        max: 360
        step: 1
        default: 15
      - id: custom-theme-sat-l
        title: Base Saturation
        type: variable-number-slider
        min: 0
        format: '%'
        max: 100
        step: 0.25
        default: 100
      - id: custom-base-c-l
        title: Base Brightness
        type: variable-number-slider
        min: 0
        format: '%'
        max: 100
        step: 0.25
        default: 99
      - id: custom-theme-tint-secondary-l
        title: Secondary Tint
        type: variable-number-slider
        min: 0
        max: 360
        step: 1
        default: 15
      - id: custom-theme-sat-secondary-l
        title: Secondary Saturation
        type: variable-number-slider
        min: 0
        format: '%'
        max: 100
        step: 0.25
        default: 77
      - id: custom-c-20-l
        title: Secondary Brightness
        type: variable-number-slider
        min: 0
        format: '%'
        max: 100
        step: 0.25
        default: 97
      - id: custom-theme-tint-text-l
        title: Text Tint
        type: variable-number-slider
        min: 0
        max: 360
        step: 1
        default: 205
      - id: custom-theme-sat-text-l
        title: Text Saturation
        type: variable-number-slider
        min: 0
        format: '%'
        max: 100
        step: 0.25
        default: 25
      - id: custom-text-c-l
        title: Text Contrast
        type: variable-number-slider
        min: 0
        format: '%'
        max: 100
        step: 0.25
        default: 43
      - id: custom-border-c-l
        title: Border Contrast
        type: variable-number-slider
        min: 0
        format: '%'
        max: 100
        step: 0.25
        default: 82
      - id: custom-color-scheme-heading-dark
        title: Custom Dark Theme
        type: heading
        level: 4
        collapsed: true
      - id: custom-color-scheme-dark
        title: Use Custom Dark Theme
        type: class-toggle
        default: false
      - id: custom-theme-tint-d
        title: Base Tint
        type: variable-number-slider
        min: 0
        max: 360
        step: 1
        default: 223
      - id: custom-theme-sat-d
        title: Base Saturation
        type: variable-number-slider
        min: 0
        format: '%'
        max: 100
        step: 0.25
        default: 63
      - id: custom-base-c-d
        title: Base Brightness
        type: variable-number-slider
        min: 0
        format: '%'
        max: 100
        step: 0.25
        default: 9
      - id: custom-theme-tint-secondary-d
        title: Secondary Tint
        type: variable-number-slider
        min: 0
        max: 360
        step: 1
        default: 225
      - id: custom-theme-sat-secondary-d
        title: Secondary Saturation
        type: variable-number-slider
        min: 0
        format: '%'
        max: 100
        step: 0.25
        default: 50
      - id: custom-c-20-d
        title: Secondary Brightness
        type: variable-number-slider
        min: 0
        format: '%'
        max: 100
        step: 0.25
        default: 13
      - id: custom-theme-tint-text-d
        title: Text Tint
        type: variable-number-slider
        min: 0
        max: 360
        step: 1
        default: 223
      - id: custom-theme-sat-text-d
        title: Text Saturation
        type: variable-number-slider
        min: 0
        format: '%'
        max: 100
        step: 0.25
        default: 19
      - id: custom-text-c-d
        title: Text Contrast
        type: variable-number-slider
        min: 0
        format: '%'
        max: 100
        step: 0.25
        default: 73
      - id: custom-border-c-d
        title: Border Contrast
        type: variable-number-slider
        min: 0
        format: '%'
        max: 100
        step: 0.25
        default: 31
      - id: file-explorer-heading
        title: File Explorer
        type: heading
        level: 2
        collapsed: true
      - id: hide-vault-title
        title: Hide Vault Tite
        type: class-toggle
        default: true
      - id: hide-folder-notes
        title: Hide Folder Notes
        description: Disguise folder notes instead of rendering them as links (AidenLx's Folder Note Plug-In)
        type: class-toggle
        default: false
      - id: prominent-folders
        title: Bold Folders
        description: Make folders more distinguishable from files.
        type: class-toggle
        default: false
      - id: hide-folder-arrows
        title: Hide Folder Collapse Indicators
        type: class-toggle
        default: false
      - id: link-file
        title: Link-Like Files
        type: class-toggle
        default: true
        description: Make files in the file explorer look like links.
      - id: file-font-size
        title: File Font Size
        type: variable-select
        default: var(--font-ui-small)
        options:
          - label: Small
            value: var(--font-ui-small)
          - label: Smaller
            value: var(--font-ui-smaller)
          - label: Smallest
            value: 10px
      - id: wrap-files
        title: Wrap File Titles
        type: class-toggle
        default: false
      - id: markdown-heading
        title: Markdown
        type: heading
        level: 2
        collapsed: true
      - id: file-line-width
        title: Readable Line Length (Reading Mode)
        type: variable-text
        default: 700px
      - id: editing-file-line-width
        title: Readable Line Length (Edit Mode)
        type: variable-text
        default: var(--file-line-width)
      - id: font-preview-view
        title: Edit Mode Font
        type: variable-select
        default: var(--font-secondary)
        options:
          - label: Default Font
            value: var(--font-text)
          - label: Secondary Font
            value: var(--font-secondary)
          - label: Monospace Font
            value: var(--font-monospace)
      - id: pure-md
        title: Pure Markdown Mode
        description: Remove as many WYSIWYG elements as possible in source mode.
        type: class-toggle
        default: true
      - id: text-heading
        title: Text
        type: heading
        level: 2
        collapsed: true
      - id: paragraphs-heading
        title: Paragraphs
        type: heading
        level: 3
        collapsed: true
      - id: line-height-normal
        title: Line Height
        type: variable-text
        default: '1.75'
      - id: p-margin
        title: Paragraph Margin
        description: The spacing between paragraphs.
        default: 20px
        type: variable-text
      - id: even-p
        title: Even Paragraphs
        type: class-toggle
        description: Make paragraphs evenly spaced (any <br> element is treated like a new line).
        default: false
      - id: indent-p
        title: Indent Paragraphs
        type: class-toggle
        default: false
      - id: justify-p
        title: Justify Paragraphs
        type: class-toggle
        default: false
      - id: p-indent
        title: Paragraph Indent
        description: Control the degree of indentation on a paragraph (requires Indent Paragraphs to be toggled on.)
        type: variable-text
        default: 15px
      - id: fonts-heading
