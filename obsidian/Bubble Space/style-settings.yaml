name: Bubble Space Settings
id: bubble-space-theme
settings:
  - id: bs-presets
    title: I. Presets
    type: heading
    level: 2
    collapsed: true
  - id: bs-presets
    title: A. Quick Color Change
    type: heading
    level: 3
    collapsed: true
  - id: info-colchange
    title: 💡
    description: The values in quick change's default use the default Bubble and Space variables, but can still be used alongside Color and Style Presets. You can check out the presets' values [here]()
    type: info-text
    markdown: true
  - id: rainbow-space
    title: Rainbow Workspace
    description: Replace color preset-based gradient w/ rainbow colors
    type: class-toggle
    default: false
  - id: rainbowMD
    title: Rainbow Markdown
    description: adds color to markdown syntax; can customize more in Basic Markdown
    type: class-toggle
    default: true
  - id: cch-bgcol
    title: Background Colors
    description: There are 4 background colors that range from light to dark in **Bubble** and dark to light in **Space**.
    type: heading
    level: 5
    collapsed: true
  - id: bubspace-bg1
    title: Background 1
    type: variable-themed-color
    format: rgb
    default-light: rgb(238, 251, 253)
    default-dark: rgb(238, 251, 253)
  - id: bubspace-bg2
    title: Background 2
    type: variable-themed-color
    format: rgb
    default-light: rgb(197, 233, 247)
    default-dark: rgb(197, 233, 247)
  - id: bubspace-bg3
    title: Background 3
    type: variable-themed-color
    format: rgb
    default-light: rgb(174, 224, 245)
    default-dark: rgb(174, 224, 245)
  - id: bubspace-bg4
    title: Background 4
    type: variable-themed-color
    format: rgb
    default-light: rgb(90, 176, 225)
    default-dark: rgb(90, 176, 225)
  - id: cch-textcol
    title: Text Colors
    description: There are 4 text colors that range from dark to light in **Bubble** and light to dark in **Space**.
    type: heading
    level: 5
    collapsed: true
  - id: bubspace-col1
    title: Text Color 1
    type: variable-themed-color
