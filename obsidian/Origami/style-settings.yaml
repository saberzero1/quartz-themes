mode: replace
sections:
  - name: origami
    id: o-theme-settings
    collapsed: false
    settings:
      - id: theme-info
        title: origami, Info
        description: |
          see an issue? missing your favorite color scheme? wanna say hi? let me know [on gitHub!](https://github.com/7368697661/Origami)

          this theme was made with 💖 by kneecaps.
        markdown: true
        type: info-text
        level: 0
      - id: o-sub-themes
        title: 🎨 color palettes
        description: a curation of custom & classic color palettes. don't see your favorite scheme? open a feature request on gitHub!
        type: heading
        level: 1
        collapsed: true
      - id: o-color-accent
        title: accent
        type: class-select
        allowEmpty: false
        default: o-red
        options:
          - label: 💖 sorcery
            value: o-red
          - label: 💚 eidolon
            value: o-green
          - label: 💙 shadow
            value: o-blue
          - label: 💜 umbra
            value: o-purple
          - label: 💜 custom
            value: o-custom
      - id: o-theme-light
        title: themes, light
        type: class-select
        allowEmpty: true
        options:
          - label: 🔴 sorcery
            value: o-red-l
          - label: 🟢 eidolon
            value: o-green-l
          - label: 🔵 shadow
            value: o-blue-l
          - label: 🟣 umbra
            value: o-purple-l
          - label: 🤍 minimum
            value: o-min-l
          - label: 📄 soft
            value: o-soft-l
          - label: 🦈 shark Time
            value: o-shark-l
          - label: ☀️ solarized
            value: o-solar-lt
          - label: 🧰 gruvbox
            value: o-gruvbox-lt
      - id: o-theme-dark
        title: themes, dark
        type: class-select
        allowEmpty: true
        options:
          - label: 🔴 sorcery
            value: o-red-d
          - label: 🟢 eidolon
            value: o-green-d
          - label: 🔵 shadow
            value: o-blue-d
          - label: 🟣 umbra
            value: o-purple-d
          - label: 🖤 minimum
            value: o-min-d
          - label: 📄 soft
            value: o-soft-d
          - label: 🦈 shark Time
            value: o-shark-d
          - label: 🌑 solarized
            value: o-solar-dt
          - label: 🧰 gruvbox
            value: o-gruvbox-dt
          - label: 🧛‍♀️ dracula
            value: o-dracula-dt
          - label: 🧠 linking your thinking
            value: o-lyt-dt
          - label: 🔪 abaddon
            value: o-end-d
          - label: 💻 nano
            value: o-hack-d
          - label: 🔥 heckhound
            value: o-heck-d
          - label: 🔥 siren
            value: o-si-d
      - id: o-list-distinct
        title: top level lists
        description: enable list header demarking 🚨 does not work in reading mode
        type: class-toggle
      - id: o-typography
        title: 📑 typography
        type: heading
        level: 1
        collapsed: true
      - id: o-font-general
        title: editor font
        type: variable-select
        allowEmpty: false
        default: IAWriter
        options:
          - label: Monaspace
            value: Monaspace
          - label: Satoshi
            value: Satoshi
          - label: Fraunces
            value: Fraunces
          - label: Nightingale
            value: Nightingale
          - label: Instrument
            value: Instrument
          - label: Aspekta
            value: Aspekta
          - label: IAWriter
            value: IAWriter
          - label: Overused Grotesk
            value: Overused Grotesk
          - label: Lexend
            value: Lexend
          - label: Uncut
            value: Uncut
          - label: DobbinTextSF-Roman
            value: DobbinTextSF-Roman
      - id: o-font-title
        title: title type
        type: variable-select
        allowEmpty: false
        default: Fraunces
        options:
          - label: Monaspace
            value: Monaspace
          - label: Satoshi
            value: Satoshi
          - label: Lexend
            value: Lexend
          - label: Fraunces
            value: Fraunces
          - label: Nightingale
            value: Nightingale
          - label: Instrument
            value: Instrument
          - label: Aspekta
            value: Aspekta
          - label: IAWriter
            value: IAWriter
          - label: Nightingale
            value: Nightingale
          - label: Uncut
            value: Uncut
          - label: Overused Grotesk
            value: Overused Grotesk
      - id: o-bold-italic
        title: change bold-italic to accent color
        type: class-toggle
      - id: o-justify
        title: justify text
        type: class-toggle
      - id: o-headings
        title: ⌨️ heading settings
        type: heading
        level: 2
        collapsed: true
      - id: o-colorful-headings
        title: rainbow headers
        type: class-toggle
      - id: o-header-line-h1
        title: header 1 underline
        type: class-toggle
      - id: o-header-line-h2
        title: header 2 underline
        type: class-toggle
      - id: o-header-line-h3
        title: header 3 underline
        type: class-toggle
      - id: o-header-line-h4
        title: header 4 underline
        type: class-toggle
      - id: o-header-line-h5
        title: header 5 underline
        type: class-toggle
      - id: o-header-line-h6
        title: header 6 underline
        type: class-toggle
      - id: o-special-features
        title: 🧪 special features
        description: option toggles, experimental features, wip testbed
        type: heading
        level: 1
        collapsed: true
      - id: o-frontmatter
        title: frontmatter card
        type: class-toggle
      - id: o-header-lapel
        title: header lapels
        description: Add numbered tags to each header gutter
        type: class-toggle
      - id: o-hover-status-bar
        title: status bar hover
        description: show status bar on hover
        type: class-toggle
      - id: o-plugins
        title: ⬇️ plugins
        type: heading
        level: 2
        collapsed: true
      - id: o-kanban-wrap
        title: wrap kanban lanes
        type: class-toggle
      - id: o-kanban-style
        title: kanban Style
        type: class-select
        allowEmpty: true
        options:
          - label: border
            value: o-kanban-border
          - label: notion-inspired
            value: o-kanban-notion
