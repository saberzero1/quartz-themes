- id: maple-plugin
  name: Maple Plugin
  settings:
    - id: info-plugin-intro
      type: info-text
      description: |-
        If you find any plugin not displaying properly, please open an issue at the [GitHub repository](https://github.com/subframe7536/obsidian-theme-maple).
        > [!info]- Adapted plugins
        > - Better Command Palette
        > - Calendar
        > - Obsidian Git
        > - MySnippets
        > - Quite Outline
        > - Recent Files
        > - Settings Search
        > - Shiki Highlighter
      description.zh: |-
        如果您发现某个插件显示不正常，请前往 [GitHub 仓库](https://github.com/subframe7536/obsidian-theme-maple) 提交 issue。
        > [!info]- 已适配的插件
        > - Better Command Palette
        > - Calendar
        > - Obsidian Git
        > - MySnippets
        > - Quite Outline
        > - Recent Files
        > - Settings Search
        > - Shiki Highlighter
      markdown: true
    - id: title-calendar
