mode: replace
sections:
  - name: GitHubDHC theme settings
    id: id
    collapsed: false
    settings:
      - id: colorblind
        title: Colorblind variants
        type: heading
        level: 1
        collapsed: true
      - id: callout
        title: Callouts
        type: heading
        level: 1
        collapsed: true
      - id: headers
        title: Headers colors
        type: heading
        level: 1
        collapsed: true
      - id: all-headers
        title: All headers
        type: heading
        level: 3
        collapsed: true
      - id: h-color-theme
        title: Header color
        type: variable-themed-color
        opacity: false
        format: hex
        default-light: '#24292f'
        default-dark: '#ffffff'
        alt-format: []
      - id: particular headers
        title: Particular headers
        description: This settings won't work if `All headers are the same color` is ON
        type: heading
        level: 3
        collapsed: true
      - id: h1-color-theme
        title: h1 color
        type: variable-themed-color
        opacity: false
        format: hex
        default-light: '#24292f'
        default-dark: '#ffffff'
        alt-format: []
      - id: h2-color-theme
        title: h2 color
        type: variable-themed-color
        opacity: false
        format: hex
        default-light: '#24292f'
        default-dark: '#ffffff'
        alt-format: []
      - id: h3-color-theme
        title: h3 color
        type: variable-themed-color
        opacity: false
        format: hex
        default-light: '#24292f'
        default-dark: '#ffffff'
        alt-format: []
      - id: h4-color-theme
        title: h4 color
        type: variable-themed-color
        opacity: false
        format: hex
        default-light: '#24292f'
        default-dark: '#ffffff'
        alt-format: []
      - id: h5-color-theme
        title: h5 color
        type: variable-themed-color
        opacity: false
        format: hex
        default-light: '#24292f'
        default-dark: '#ffffff'
        alt-format: []
      - id: h6-color-theme
        title: h6 color
        type: variable-themed-color
        opacity: false
        format: hex
        default-light: '#24292f'
        default-dark: '#ffffff'
        alt-format: []
      - id: kanban
        title: Kanban
        type: heading
        level: 1
        collapsed: true
      - id: kanban-variant
        title: Kanban variant
        description: Variations of Kanban styles
        type: class-select
        allowEmpty: false
        default: kanban-full
        options:
          - label: GitHub projects style
            value: kanban-full
          - label: Minimal style
            value: kanban-on
          - label: Disable styles
            value: kanban-off
