mode: replace
sections:
  - name: Ouroboros Theme
    id: things-style
    collapsed: false
    settings:
      - id: features
        title: Features
        type: heading
        level: 2
        collapsed: true
      - title: Black mobile background
        description: Change mobile editor background to default theme black
        id: mobile-black-background
        type: class-toggle
        default: false
      - title: Disable mobile floating-action button
        description: Revert placement of edit/preview button to default in header (mobile)
        id: floating-button-off
        type: class-toggle
        default: false
      - title: Highlight active line
        description: Change background color of current working line
        id: active-line
        type: class-toggle
        default: false
      - title: Fancy code blocks
        description: Enable fancy numbered code blocks
        id: fancy-code
        type: class-toggle
        default: false
      - title: Fancy highlighting
        description: Enable fancy highlight styles with highlight underlines
        id: fancy-highlight
        type: class-toggle
        default: false
      - title: Disable Kanban board styles
        description: Remove minimalist styling to the Kanban plugin
        id: no-kanban-styles
        type: class-toggle
        default: false
      - id: design-tweaks
        title: Design Tweaks
        type: heading
        level: 2
        collapsed: true
      - title: Moss accent preset
        description: Switch accents to a quieter green palette
        id: accent-moss
        type: class-toggle
        default: false
      - title: Amber accent preset
        description: Switch accents to a warmer amber palette
        id: accent-amber
        type: class-toggle
        default: false
      - title: Compact UI density
        description: Tighten tab, sidebar, and control spacing
        id: compact-ui
        type: class-toggle
        default: false
      - title: Airy reading density
        description: Increase reading width and line height
        id: airy-reading
        type: class-toggle
        default: false
      - id: link-decoration
        title: Underline internal links
        description: Show underlines on internal links
        type: variable-select
        default: Underline
        options:
          - label: Underline
            value: Underline
          - label: None
            value: None
      - id: link-external-decoration
        title: Underline external links
        description: Show underlines on external links
        type: variable-select
        default: Underline
        options:
          - label: Underline
            value: Underline
          - label: None
            value: None
      - id: custom-fonts
        title: Typography
        type: heading
        level: 2
        collapsed: true
      - id: default-font-color
        title: Default font colors
        description: Use the default font color styling for bold, italics, and quotes
        type: class-toggle
        default: false
      - id: text-highlight-bg-l
        title: Highlight color (light)
        type: variable-color
        format: rgb
        default: rgba(255, 208, 0, 0.4)
        alt-format: []
      - id: text-highlight-bg-d
        title: Highlight color (dark)
        type: variable-color
        format: rgb
        default: rgba(255, 208, 0, 0.4)
        alt-format: []
      - id: strong-color
        title: Bold font color
        type: variable-color
        format: hex
        default: '#FF82B2'
        alt-format: []
      - id: em-color
        title: Italics font color
        type: variable-color
        format: hex
        default: '#FF82B2'
        alt-format: []
      - id: quote-color
        title: Blockquotes font color
        type: variable-color
        format: hex
        default: '#3EB4BF'
        alt-format: []
      - id: code-normal
        title: Inline code blocks font color (Light mode)
        type: variable-color
        format: hex
        default: '#5C6773'
        alt-format: []
      - id: code-color-d
        title: Inline code blocks font color (Dark mode)
        type: variable-color
        format: hex
        default: '#D7DBE0'
        alt-format: []
      - id: tag-background-color-l
        title: Tag background color (Light mode)
        type: variable-color
        format: hex
        default: '#BDE1D3'
        alt-format: []
      - id: tag-font-color-l
        title: Tag font color (Light mode)
        type: variable-color
        format: hex
        default: '#1D694B'
        alt-format: []
      - id: tag-background-color-d
        title: Tag background color (Dark mode)
        type: variable-color
        format: hex
        default: '#1D694B'
        alt-format: []
      - id: tag-font-color-d
        title: Tag font color (Dark mode)
        type: variable-color
        format: hex
        default: '#FFFFFF'
        alt-format: []
      - id: progress-color
        title: Progress colorful mode switcher
        description: Toggle progress color scheme
        type: class-toggle
        default: false
      - id: progress-color-1
        title: progress 2-39% color
        type: variable-color
        opacity: true
        format: hex
        default: '#ad5758'
        alt-format: []
      - id: progress-color-2
        title: progress 40-59% color
        type: variable-color
        opacity: true
        format: hex
        default: '#b87f4c'
        alt-format: []
      - id: progress-color-3
        title: progress 60-79% color
        type: variable-color
        opacity: true
        format: hex
        default: '#d2b874'
        alt-format: []
      - id: progress-color-4
        title: progress 80-99% color
        type: variable-color
        opacity: true
        format: hex
        default: '#b0c07e'
        alt-format: []
      - id: progress-color-5
        title: progress 1,100% color
        type: variable-color
        opacity: true
        format: hex
        default: '#768399'
        alt-format: []
      - id: headings
        title: Headings
        type: heading
        level: 2
        collapsed: true
      - id: level-1-headings
        title: Level 1 Headings
        type: heading
        level: 3
        collapsed: true
      - id: h1-size
        title: H1 font size
        description: Accepts any CSS font-size value
        type: variable-text
        default: clamp(1.7em, 1.55em + 0.3vw, 1.95em)
      - id: h1-weight
        title: H1 font weight
        description: Accepts numbers representing the CSS font-weight
        type: variable-number
        default: 700
      - id: h1-color
        title: H1 color
        type: variable-color
        format: hex
        default: '#'
        alt-format: []
      - id: level-2-headings
        title: Level 2 Headings
        type: heading
        level: 3
        collapsed: true
      - id: h2-size
        title: H2 font size
        description: Accepts any CSS font-size value
        type: variable-text
        default: clamp(1.42em, 1.32em + 0.22vw, 1.6em)
      - id: h2-weight
        title: H2 font weight
        description: Accepts numbers representing the CSS font-weight
        type: variable-number
        default: 700
      - id: h2-color
        title: H2 color
        type: variable-color
        format: hex
        default: '#2E80F2'
        alt-format: []
      - id: h2-underline
        title: H2 underline
        description: Toggle H2 underline (border-bottom)
        type: class-toggle
        default: true
      - id: level-3-headings
        title: Level 3 Headings
        type: heading
        level: 3
        collapsed: true
      - id: h3-size
        title: H3 font size
        description: Accepts any CSS font-size value
        type: variable-text
        default: clamp(1.22em, 1.15em + 0.16vw, 1.34em)
      - id: h3-weight
        title: H3 font weight
        description: Accepts numbers representing the CSS font-weight
        type: variable-number
        default: 600
      - id: h3-color
        title: H3 color
        type: variable-color
        format: hex
        default: '#2E80F2'
        alt-format: []
      - id: level-4-headings
        title: Level 4 Headings
        type: heading
        level: 3
        collapsed: true
      - id: h4-size
        title: H4 font size
        description: Accepts any CSS font-size value
        type: variable-text
        default: clamp(1.08em, 1.03em + 0.1vw, 1.16em)
      - id: h4-weight
        title: H4 font weight
        description: Accepts numbers representing the CSS font-weight
        type: variable-number
        default: 500
      - id: h4-color
        title: H4 color
        type: variable-color
        format: hex
        default: '#E5B567'
        alt-format: []
      - id: h4-transform
        title: H4 transform
        description: Transform the H4 heading text
        type: variable-select
        default: uppercase
        options:
          - label: Uppercase
            value: uppercase
          - label: None
            value: none
      - id: level-5-headings
        title: Level 5 Headings
        type: heading
        level: 3
        collapsed: true
      - id: h5-size
        title: H5 font size
        description: Accepts any CSS font-size value
        type: variable-text
        default: clamp(1em, 0.98em + 0.05vw, 1.05em)
      - id: h5-weight
        title: H5 font weight
        description: Accepts numbers representing the CSS font-weight
        type: variable-number
        default: 500
      - id: h5-color
        title: H5 color
        type: variable-color
        format: hex
        default: '#E83E3E'
        alt-format: []
      - id: level-6-headings
        title: Level 6 Headings
        type: heading
        level: 3
        collapsed: true
      - id: h6-size
        title: H6 font size
        description: Accepts any CSS font-size value
        type: variable-text
        default: clamp(0.9em, 0.88em + 0.03vw, 0.95em)
      - id: h6-weight
        title: H6 font weight
        description: Accepts numbers representing the CSS font-weight
        type: variable-number
        default: 400
      - id: h6-color
        title: H6 color
        type: variable-color
        format: hex
        default: '#'
        alt-format: []
      - id: new-features
        title: New Features
        type: heading
        level: 2
        collapsed: true
      - title: Sage accent preset
        description: Switch accents to a calm sage green palette
        id: accent-sage
        type: class-toggle
        default: false
      - title: Focus mode
        description: Hide sidebar and ribbon — hover to reveal ribbon temporarily
        id: focus-mode
        type: class-toggle
        default: false
      - title: CJK typography mode
        description: Use CJK-optimized sans-serif font stack for Chinese/Japanese/Korean text
        id: cjk-mode
        type: class-toggle
        default: false
      - title: CJK serif font
        description: Switch CJK mode to use a serif (Song/Ming) font stack. Requires CJK mode on.
        id: cjk-serif
        type: class-toggle
        default: false
      - title: Reduce motion
        description: Disable all animations and transitions (overrides prefers-reduced-motion)
        id: reduce-motion
        type: class-toggle
        default: false
      - id: credits
        title: Credits
        type: heading
        description: Created by Lemon695. Visual direction inspired by the Things app and the original Things theme by @colineckert.
        level: 2
        collapsed: true
