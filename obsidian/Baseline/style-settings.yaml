      - id: migrate
        title: Migrate configuration
        type: info-text
        level: 1
        markdown: true
        description: Migrate **existing Style Settings** from supported themes. ↗[](https://aaaaalexis.github.io/obsidian-baseline/migration/)
      - id: marketplace
        title: Community presets
        type: info-text
        level: 1
        markdown: true
        description: Discover Style Settings presets in **Baseline Marketplace**. ↗[](https://aaaaalexis.github.io/obsidian-baseline/marketplace/)
      - id: missing-font
        title: Extended heading font
        title.zh-TW: 擴充語言支援
        title.zh: 扩展语言支持
        title.jp: 拡張言語サポート
        type: info-text
        level: 1
        markdown: true
        description: Heading font missing glyphs? Get **extended font CSS snippet**. ↗[](https://github.com/aaaaalexis/obsidian-baseline/blob/main/snippets/baseline-extension-font.css)
        description.zh-TW: 標題出現缺字？請下載中文字型 CSS 片段。[](https://github.com/aaaaalexis/obsidian-baseline/blob/main/snippets/baseline-extension-font.css)
        description.zh: 标题出现缺字？请下载中文字型 CSS 代码片段。[](https://github.com/aaaaalexis/obsidian-baseline/blob/main/snippets/baseline-extension-font-cn.css)
        description.jp: タイトルで文字が表示されない？日本語フォントの CSS スニペットをダウンロード。[](https://github.com/aaaaalexis/obsidian-baseline/blob/main/snippets/baseline-extension-font-jp.css)
