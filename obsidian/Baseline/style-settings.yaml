      markdown: true
      description: Migrate **existing Style Settings** from supported themes. ↗[](https://aaaaalexis.github.io/obsidian-baseline/migration/)
    - id: marketplace
      title: Community presets
      type: info-text
      level: 1
      markdown: true
      description: Discover Style Settings presets in **Baseline Marketplace**. ↗[](https://aaaaalexis.github.io/obsidian-baseline/marketplace/)
    - id: missing-font
      title: Extended heading font
      type: info-text
      level: 1
      markdown: true
      description: Heading font missing glyphs? Get **extended font CSS snippet**. ↗[](https://github.com/aaaaalexis/obsidian-baseline/blob/main/snippets/baseline-extension-font.css)
