mode: replace
sections:
  - name: ｡ ₊°༺ ultra lobster ༻°₊ ｡
    id: ulu-theme-settings
    collapsed: false
    settings:
      - id: theme-info
        title: An Intentional Writing Space
        description: |
          see an issue? want to suggest a feature? visit us on github: <https://github.com/7368697061/ultra-lobster> this theme was made with 💖 by kneecaps. 
        markdown: true
        type: info-text
        level: 0
      - id: ulu-subtheme
        title: 0️⃣ .𖥔 ݁ ˖ Themes & Colors ⊹ ࣪ ˖
        type: heading
        level: 1
        collapsed: true
      - id: ulu-custom-palette
        title: 🎨 .𖥔 ݁ ˖ Custom Palette ⊹ ࣪ ˖
        description: Active when the 🎨 custom dark or light subtheme is selected. All other subthemes ignore these settings.
        type: heading
        level: 1
        collapsed: true
      - id: ulu-custom-dark-heading
        title: ✦ Dark
        type: heading
        level: 2
        collapsed: false
      - id: ulu-custom-d-bg-1
        title: Background primary
        description: Main workspace background
        type: variable-color
        default: '#1a1b26'
        format: hex
        alt-format: []
      - id: ulu-custom-d-bg-2
        title: Background secondary
        description: Sidebar and secondary panels
        type: variable-color
        default: '#16161e'
        format: hex
        alt-format: []
      - id: ulu-custom-d-text
        title: Text color
        type: variable-color
        default: '#c0caf5'
        format: hex
        alt-format: []
      - id: ulu-custom-d-text-muted
        title: Text — muted
        description: Secondary text, captions, labels
        type: variable-color
        default: '#565f89'
        format: hex
        alt-format: []
      - id: ulu-custom-d-text-faint
        title: Text — faint
        description: Very subdued text, placeholders, disabled
        type: variable-color
        default: '#3b4261'
        format: hex
        alt-format: []
      - id: ulu-custom-d-red
        title: Red
        type: variable-color
        default: '#f7768e'
        format: hex
        alt-format: []
      - id: ulu-custom-d-orange
        title: Orange
        type: variable-color
        default: '#ff9e64'
        format: hex
        alt-format: []
      - id: ulu-custom-d-yellow
        title: Yellow
        type: variable-color
        default: '#e0af68'
        format: hex
        alt-format: []
      - id: ulu-custom-d-green
        title: Green
        type: variable-color
        default: '#9ece6a'
        format: hex
        alt-format: []
      - id: ulu-custom-d-cyan
        title: Cyan
        type: variable-color
        default: '#7dcfff'
        format: hex
        alt-format: []
      - id: ulu-custom-d-blue
        title: Blue
        type: variable-color
        default: '#7aa2f7'
        format: hex
        alt-format: []
      - id: ulu-custom-d-purple
        title: Purple
        type: variable-color
        default: '#bb9af7'
        format: hex
        alt-format: []
      - id: ulu-custom-d-pink
        title: Pink
        type: variable-color
        default: '#f7768e'
        format: hex
        alt-format: []
      - id: ulu-custom-light-heading
        title: ✦ Light
        type: heading
        level: 2
        collapsed: true
      - id: ulu-custom-l-bg-1
        title: Background primary
        description: Main workspace background
        type: variable-color
        default: '#fafafa'
        format: hex
        alt-format: []
      - id: ulu-custom-l-bg-2
        title: Background secondary
        description: Sidebar and secondary panels
        type: variable-color
        default: '#f0f0f0'
        format: hex
        alt-format: []
      - id: ulu-custom-l-text
        title: Text color
        type: variable-color
        default: '#383a42'
        format: hex
        alt-format: []
      - id: ulu-custom-l-text-muted
        title: Text — muted
        description: Secondary text, captions, labels
        type: variable-color
        default: '#696c77'
        format: hex
        alt-format: []
      - id: ulu-custom-l-text-faint
        title: Text — faint
        description: Very subdued text, placeholders, disabled
        type: variable-color
        default: '#9a9b9c'
        format: hex
        alt-format: []
      - id: ulu-custom-l-red
        title: Red
        type: variable-color
        default: '#e45649'
        format: hex
        alt-format: []
      - id: ulu-custom-l-orange
        title: Orange
        type: variable-color
        default: '#c18401'
        format: hex
        alt-format: []
      - id: ulu-custom-l-yellow
        title: Yellow
        type: variable-color
        default: '#986801'
        format: hex
        alt-format: []
      - id: ulu-custom-l-green
        title: Green
        type: variable-color
        default: '#50a14f'
        format: hex
        alt-format: []
      - id: ulu-custom-l-cyan
        title: Cyan
        type: variable-color
        default: '#0184bc'
        format: hex
        alt-format: []
      - id: ulu-custom-l-blue
        title: Blue
        type: variable-color
        default: '#4078f2'
        format: hex
        alt-format: []
      - id: ulu-custom-l-purple
        title: Purple
        type: variable-color
        default: '#a626a4'
        format: hex
        alt-format: []
      - id: ulu-custom-l-pink
        title: Pink
        type: variable-color
        default: '#ca1243'
        format: hex
        alt-format: []
      - id: ulu-interface
        title: 🖥️ .𖥔 ݁ ˖ Interface ⊹ ࣪ ˖
        type: heading
        level: 1
        collapsed: true
      - id: ulu-interface-layout
        title: 🪟 Layout
        type: heading
        level: 2
        collapsed: true
      - id: ulu-float-header
        title: Floating View Header
        description: the back/breadcrumb/action bar row floats over the note card instead of sitting above it, giving the note more vertical space
        type: class-toggle
        default: false
      - id: ulu-float-header-peek
        title: Floating Header — Hover to Reveal
        description: when floating header is enabled, hides the bar until you hover over the note card (requires floating view header to be on)
        type: class-toggle
        default: false
      - id: ulu-peek-statusbar
        title: Status Bar — Hover to Reveal
        description: hides the status bar until you hover near the bottom of the window
        type: class-toggle
        default: false
      - id: ulu-settings-horizontal
        title: Horizontal Settings Nav
        description: replaces the left sidebar with a horizontal scrolling nav strip across the top of the settings pane
        type: class-toggle
        default: false
      - id: ulu-tab-flat
        title: Flat Active Tab Style
        description: reverts the active tab to the flat inset highlight style instead of the sculpted neumorphic shadow
        type: class-toggle
        default: false
      - id: ulu-no-tab-pills
        title: Hide Tab Control Pill Borders
        description: removes borders and background from the new-tab, tab-list, and sidebar toggle buttons at the edge of the tab bar
        type: class-toggle
        default: false
      - id: ulu-no-motion
        title: Reduce Motion
        description: disables all animations and transitions — for accessibility or preference. the OS-level prefers-reduced-motion setting is also respected automatically without this toggle
        type: class-toggle
        default: false
      - id: ulu-interface-fancy
        title: ✨ Decorative
        type: heading
        level: 2
        collapsed: true
      - id: ulu-we1
        title: New-Tab Empty State (Gradient + Lobster)
        description: applies the "working edits" style empty state when no tabs are open
        type: class-toggle
      - id: ulu-grad
        title: Halo Gradient
        description: enable a wip background animation inspired by soft grainy gradients and angel numbers
        type: class-toggle
      - id: ulu-enable-custom-bg
        title: Enable Custom Workspace Background
        description: '⚠️ only supported with the ''abaddon glass'' dark subtheme. for a local image or base64: drop ultra-lobster-bg.css (from theme snippets/) + your image into your obsidian snippets folder and enable the snippet. for a web url: paste below. both can be active — url field takes priority.'
        type: class-toggle
      - id: ulu-custom-bg-url
        title: Custom Background Web URL
        description: takes priority over the snippet. paste a direct image link wrapped in url("https://..."). leave as 'none' to use the snippet instead.
        type: variable-text
        default: none
      - id: ulu-interface-blur
        title: 🌫️ Blur
        type: heading
        level: 2
        collapsed: true
      - id: ulu-blur-modal
        title: Blur Settings Pane Background
        type: class-toggle
      - id: ulu-blur-prompt
        title: Blur Command Palette Background
        type: class-toggle
      - id: ulu-blur-tooltip
        title: Blur Tooltip Background
        type: class-toggle
      - id: ulu-blur-menu
        title: Blur Popup Menu
        type: class-toggle
      - id: ulu-status-pills-blur
        title: Blur Status Bar Pills
        description: blurs the background of the statusbar pill option
        type: class-toggle
      - id: ulu-no-blur-callouts
        title: Disable Callout Blur
        type: class-toggle
      - id: ulu-no-blur-mobile
        title: Disable Mobile Nav Blur
        type: class-toggle
      - id: ulu-no-blur-canvas
        title: Disable Canvas Blur
        description: removes the backdrop-filter blur effect from canvas nodes
        type: class-toggle
      - id: ulu-interface-other
        title: 🧩 Components
        type: heading
        level: 2
        collapsed: true
      - id: ulu-status-pills
        title: Island Pill Status Bar
        description: separates statusbar items into pills
        type: class-toggle
      - id: ulu-prop-card
        title: Properties Card
        description: wraps the frontmatter properties block in a glass slab with inset value wells (off by default for a minimal layout)
        type: class-toggle
        default: false
      - id: ulu-neon-tags
        title: Neon Glass Property Tags
        description: restores the glowing accent-coloured pill style for multi-select property tags
        type: class-toggle
        default: false
      - id: ulu-inline-property-tags
        title: Inline Property Tags
        description: makes property tags look like standard inline wireframe tags
        type: class-toggle
        default: false
      - id: ulu-active-line-pop
        title: Active Line Popup Animation
        description: adds a popup scale animation when switching lines (works with any active line highlight style)
        type: class-toggle
        default: false
      - id: ulu-glass-chev
        title: Glass Chevrons
        description: replaces the default dot indicators with glass bubble chevrons
        type: class-toggle
        default: false
      - id: ulu-plugins
        title: 🔌 .𖥔 ݁ ˖ Plugins ⊹ ࣪ ˖
        type: heading
        level: 1
        collapsed: true
      - id: ulu-typography
        title: 📑 .𖥔 ݁ ˖ Typography ⊹ ࣪ ˖
        type: heading
        level: 1
        collapsed: true
      - id: ulu-font-general
        title: Editor Font
        type: variable-select
        allowempty: false
        default: satoshi
        options:
          - label: satoshi ࣪ ִֶָ☾.sans
            value: satoshi
          - label: getai ࣪ ִֶָ☾.sans
            value: getai
          - label: aspekta ࣪ ִֶָ☾.sans
            value: aspekta
          - label: general sans ࣪ ִֶָ☾.sans
            value: general sans
          - label: inter ࣪ ִֶָ☾.sans
            value: inter
          - label: space grotesk ࣪ ִֶָ☾.sans
            value: space grotesk
          - label: lexend ࣪ ִֶָ☾.sans
            value: lexend
          - label: dobbintextsf-roman ࣪ ִֶָ☾.sans
            value: dobbintextsf-roman
          - label: eurostile ࣪ ִֶָ☾.sans
            value: eurostile
          - label: fraunces ✦ serif
            value: fraunces
          - label: nightingale ✦ serif
            value: nightingale
          - label: instrument ✦ serif
            value: instrument
          - label: newsreader ✦ serif
            value: Newsreader
          - label: monaspace ‪‪❤︎‬ mono
            value: monaspace
          - label: iawriter ‪‪❤︎‬ mono
            value: iawriter
          - label: martian mono ‪‪❤︎‬ mono
            value: martian mono
      - id: ulu-font-title
        title: Title Typeface
        type: variable-select
        allowempty: false
        default: monaspace
        options:
          - label: satoshi ࣪ ִֶָ☾.sans
            value: satoshi
          - label: getai ࣪ ִֶָ☾.sans
            value: getai
          - label: aspekta ࣪ ִֶָ☾.sans
            value: aspekta
          - label: general sans ࣪ ִֶָ☾.sans
            value: general sans
          - label: inter ࣪ ִֶָ☾.sans
            value: inter
          - label: space grotesk ࣪ ִֶָ☾.sans
            value: space grotesk
          - label: lexend ࣪ ִֶָ☾.sans
            value: lexend
          - label: dobbintextsf-roman ࣪ ִֶָ☾.sans
            value: dobbintextsf-roman
          - label: eurostile ࣪ ִֶָ☾.sans
            value: eurostile
          - label: fraunces ✦ serif
            value: fraunces
          - label: nightingale ✦ serif
            value: nightingale
          - label: instrument ✦ serif
            value: instrument
          - label: newsreader ✦ serif
            value: Newsreader
          - label: monaspace ‪‪❤︎‬ mono
            value: monaspace
          - label: iawriter ‪‪❤︎‬ mono
            value: iawriter
          - label: martian mono ‪‪❤︎‬ mono
            value: martian mono
      - id: responsive-text
        title: Text Scale
        description: 🚨 must be a whole / decimal number such as 1 or 1.1. further scale can be changed via slider in appearance
        type: variable-number
        default: 1
        format: em
      - id: ulu-accent-bold-italic
        title: Accent Bold & Italic
        description: applies distinct accent colors to bold and italic text
        type: class-toggle
      - id: ulu-serif-italic
        title: Serif Italic
        description: renders italic text in a serif typeface
        type: class-toggle
      - id: ulu-duo-tag
        title: Split Tags
        type: class-toggle
      - id: ulu-no-hyphenate
        title: Disable Auto-Hyphenation
        description: turns off automatic hyphenation on paragraphs (on by default)
        type: class-toggle
        default: false
      - id: ulu-print-link-urls
        title: Print / PDF — Show Link URLs
        description: when printing or exporting to PDF, append the URL after external links
        type: class-toggle
      - id: ulu-inline-title-heading
        title: Inline Title
        type: heading
        level: 2
        collapsed: true
      - id: ulu-inline-title-size
        title: Size
        description: in em
        type: variable-number
        default: 2.5
        format: em
      - id: ulu-inline-title-weight
        title: Weight
        description: numeric font weight e.g. 300 400 500 600 700
        type: variable-number
        default: 500
      - id: ulu-title-underline
        title: Underline
        type: class-toggle
        default: false
      - id: ulu-shimmer-title
        title: Shimmer
        description: animates the note title with a flowing accent-colour shimmer gradient
        type: class-toggle
        default: false
      - id: ulu-text-rendering-heading
        title: Text Rendering
        type: heading
        level: 2
        collapsed: true
      - id: ulu-tabular-nums
        title: Tabular Numbers
        description: all digits use tabular (monospace) figures across the whole note — good for data-heavy vaults
        type: class-toggle
        default: false
      - id: ulu-stylistic-alts
        title: Stylistic Alternates
        description: 'enables font-feature-settings: "ss01" for fonts that ship optical variants (Inter, Recursive, Fraunces)'
        type: class-toggle
        default: false
      - id: ulu-disable-ligatures
        title: Disable Ligatures
        description: turns off common and contextual ligatures for maximum readability on dense code-heavy notes
        type: class-toggle
        default: false
      - id: ulu-measure-heading
        title: Measure & Line Width
        type: heading
        level: 2
        collapsed: true
      - id: ulu-custom-measure
        title: Custom Line Width
        description: apply opinionated line widths — 80ch editor, 68ch reading. override below.
        type: class-toggle
        default: false
      - id: ulu-edit-line-width
        title: Editor Line Width
        type: variable-number-slider
        default: 80
        min: 40
        max: 120
        step: 2
        format: ch
      - id: ulu-reading-line-width
        title: Reading Line Width
        type: variable-number-slider
        default: 68
        min: 40
        max: 120
        step: 2
        format: ch
      - id: ulu-custom-body-weight
        title: Custom Body Weight
        description: enable body font weight control (uses the slider below)
        type: class-toggle
        default: false
      - id: ulu-body-weight
        title: Body Font Weight
        type: variable-number-slider
        default: 400
        min: 300
        max: 600
        step: 50
      - id: ulu-links-heading
        title: Link Styles
        type: heading
        level: 2
        collapsed: true
      - id: ulu-flourishes-heading
        title: Flourishes
        type: heading
        level: 2
        collapsed: true
      - id: ulu-superscript-footnotes
        title: OpenType Superscript Footnotes
        description: 'uses font-feature-settings: "sups" for native superscript numerals on footnote links'
        type: class-toggle
        default: false
      - id: ulu-rough-highlight
        title: Rough Marker Highlight
        description: gives ==highlighted== text an organic hand-drawn marker edge via SVG displacement
        type: class-toggle
      - id: ulu-indent-dashed
        title: Indent Guide — Dashed
        description: switch the indent guide line from solid to dashed in both reading and editing modes
        type: class-toggle
        default: false
      - id: ulu-headings
        title: ⌨️ Headings
        type: heading
        level: 2
        collapsed: true
      - id: ulu-colorfo-headings
        title: Rainbow Headers
        type: class-toggle
      - id: ulu-no-balance-headings
        title: Disable Balanced Heading Wrap
        description: turns off text-wrap balance on headings (escape hatch for browsers where it misbehaves)
        type: class-toggle
        default: false
      - id: ulu-teardrop-fold
        title: Teardrop Fold Indicator
        description: enables the animated water-drop / circle fold indicator for headings; teardrop hangs point-up (open), morphs to a circle on collapse with physics animation. obsidian's native chevron is used by default.
        type: class-toggle
        default: false
      - id: ulu-fold-hover
        title: Fold Indicator — Hover to Reveal
        description: hide the fold indicator until you hover over a heading; works with both teardrop and the native obsidian indicator
        type: class-toggle
        default: false
      - id: h1-size
        title: H1 Size (em)
        description: custom size in em units; active preset overrides this — clear the preset above to use custom sizes
        type: variable-number
        default: 2
        format: em
      - id: h2-size
        title: H2 Size (em)
        type: variable-number
        default: 1.6
        format: em
      - id: h3-size
        title: H3 Size (em)
        type: variable-number
        default: 1.37
        format: em
      - id: h4-size
        title: H4 Size (em)
        type: variable-number
        default: 1.25
        format: em
      - id: h5-size
        title: H5 Size (em)
        type: variable-number
        default: 1.12
        format: em
      - id: h6-size
        title: H6 Size (em)
        type: variable-number
        default: 1
        format: em
      - id: ulu-no-h2-line
        title: Disable H2 Underline
        description: removes the gradient underline from h2 headings
        type: class-toggle
      - id: ulu-h1-line-color
        title: H1 Underline Color
        type: variable-select
        allowempty: false
        default: var(--ulu-header-line-accent, var(--background-modifier-border))
        options:
          - label: follow global underline
            value: var(--ulu-header-line-accent, var(--background-modifier-border))
          - label: match header text color
            value: var(--ulu-h1-text-color, var(--ulu-header-line-accent, var(--background-modifier-border)))
          - label: monochrome
            value: var(--background-modifier-border)
          - label: accent
            value: var(--color-accent)
          - label: red
            value: var(--color-red)
          - label: orange
            value: var(--color-orange)
          - label: yellow
            value: var(--color-yellow)
          - label: green
            value: var(--color-green)
          - label: cyan
            value: var(--color-cyan)
          - label: blue
            value: var(--color-blue)
          - label: purple
            value: var(--color-purple)
          - label: pink
            value: var(--color-pink)
      - id: ulu-h2-line-color
        title: H2 Underline Color
        type: variable-select
        allowempty: false
        default: var(--ulu-header-line-accent, var(--background-modifier-border))
