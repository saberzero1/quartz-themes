          - label: pink
            value: var(--color-pink)
      - id: ulu-h4-line-color
        title: H4 Underline Color
        type: variable-select
        allowempty: false
        default: var(--ulu-header-line-accent, var(--background-modifier-border))
        options:
          - label: follow global underline
            value: var(--ulu-header-line-accent, var(--background-modifier-border))
          - label: match header text color
