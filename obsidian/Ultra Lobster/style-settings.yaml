        description: Use [!col] with nested >> callouts as columns. Use [!col-strip] as a column to remove chrome from its contents.
        type: heading
        level: 1
      - id: ulu-col-gap
        title: Column gap
        type: variable-number-slider
        default: 16
        min: 0
        max: 48
        step: 4
        format: px
      - id: ulu-ref-heading
        title: 📖 .𖥔 ݁ ˖ Usage Reference ⊹ ࣪ ˖
        description: quick reference for spans, per-note classes, callouts, and task icons
        type: heading
        level: 1
        collapsed: true
      - id: ulu-ref-spans
        title: Inline Spans & Marks
        description: |
          Use `<span>` or `<mark>` directly in note body (works in reading view):

          `<span class="drop-cap">full paragraph text here</span>`
          → large drop cap on the first letter; remaining text flows normally

          `<span class="smcp">text</span>`
          → small caps (requires a font with OpenType `smcp` glyphs)

          `<span class="spoiler">hidden text</span>`
          → hidden behind a bar until hovered; works across multiple lines

          `==highlighted text==` uses the global highlight color set in Style Settings.
          For per-mark color overrides use `<mark class="ulu-X">text</mark>`:
          `ulu-r` red &nbsp; `ulu-g` green &nbsp; `ulu-b` blue &nbsp; `ulu-p` purple &nbsp; `ulu-o` orange &nbsp; `ulu-y` yellow
        markdown: true
        type: info-text
        level: 2
      - id: ulu-ref-note-classes
        title: Per-note CSS Classes
        description: |
          Add to a note's frontmatter to apply only to that note:
          ```
          ---
          cssclasses: [ulu-justify, ulu-accent-title]
          ---
          ```
          `ulu-justify` — justified paragraph text with auto-hyphenation

          `ulu-accent-title` — accent-coloured inline note title

          `ulu-minimal-properties` — strips slab/border/shadow from the properties block
        markdown: true
        type: info-text
        level: 2
      - id: ulu-ref-callouts
        title: Callouts
        description: |
          **Multi-column layout** — use `[!col]` with `>>` nested callouts as columns:
          ```
          > [!col]
          >> First column content here.
          >
          >> Second column content here.
          ```
          Use `[!col-strip]` as a column type to remove all chrome from its contents.
        markdown: true
        type: info-text
        level: 2
      - id: ulu-ref-tasks
        title: Task List Icons
        description: |
          Custom task types replace the standard checkbox with a coloured icon:

          `- [!]` red alert &nbsp; `- [?]` orange question &nbsp; `- [i]` blue info
          `- [*]` purple star &nbsp; `- [+]` green add &nbsp; `- [-]` grey cancelled
          `- [b]` orange bookmark &nbsp; `- ["]` grey quote &nbsp; `- [l]` red pin
        markdown: true
        type: info-text
        level: 2
