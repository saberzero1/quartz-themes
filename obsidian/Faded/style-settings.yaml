mode: replace
sections:
  - name: Faded Theme - Miscellaneous Options
    id: test
    collapsed: false
    settings:
      - id: fonts
        title: Font
        description: Change Font
        type: class-select
        allowEmpty: false
        default: font-Cuprum
        options:
          - label: Cuprum (Faded Defualt)
            value: font-Cuprum
          - label: Kreon
            value: font-Kreon
          - label: Roboto Condensed
            value: font-Roboto-Condensed
          - label: Gemunu Libre
            value: font-Gemunu-Libre
          - label: (Obsidian Defualt)
            value: none
      - id: Gradient-Bullet-Point-Lines
        title: Gradient Bullet Point Lines
        description: Adds a gradient to bullet point lines
        type: class-select
        allowEmpty: false
        default: none
        options:
          - label: Enabled
            value: gradientBulletPointLines
          - label: Disabled
            value: none
      - id: Check-List-Strikeout
        title: Check List Strikeout (In Development)
        description: Adds a strikeout to checked Items
        type: class-select
        allowEmpty: false
        default: none
        options:
          - label: Enabled
            value: none
          - label: Disabled
            value: checkListStrikeout
      - id: Header-Icons
        title: Header Icons
        description: Adds Icons To Headers
        type: class-select
        allowEmpty: false
        default: headerIcons
        options:
          - label: Enabled
            value: headerIcons
          - label: Disabled
            value: none
      - id: Folder-Icons
        title: Folder Icons
        description: Adds Icons To Folders
        type: class-select
        allowEmpty: false
        default: folderIcons
        options:
          - label: Enabled
            value: folderIcons
          - label: Disabled
            value: none
      - id: File-Icons
        title: File Icons
        description: Adds Icons To Files
        type: class-select
        allowEmpty: false
        default: fileIcons
        options:
          - label: Enabled
            value: fileIcons
          - label: Disabled
            value: none
      - id: Vault-Title
        title: Custom Vault Title
        description: Enabled/Disabled Custom Style For Vault Title
        type: class-select
        allowEmpty: false
        default: vaultTitle
        options:
          - label: Enabled
            value: vaultTitle
          - label: Disabled
            value: none
  - name: Faded Theme - Sliding Panes Options
    id: Faded-Theme-Sliding-Panes-Options
    collapsed: false
    settings:
      - id: Enable-Stacked-Panes
        title: Enable Stacked Panes
        description: Enable to allow panes/pages to stack side by side - "Requires restart if restored to defualt"
        type: class-select
        allowEmpty: false
        default: stackedPanes
        options:
          - label: Enabled
            value: stackedPanes
      - id: Minimum-Page-Width
        title: Minimum Page Width
        description: The minimum allowed width of a page
        type: variable-number-slider
        default: 700
        format: px
        min: 300
        max: 1920
        step: 20
  - name: Modular CSS Layout - Multi Column
    id: modular-css-layout-mc
    collapsed: false
    settings:
      - id: multi-column-title
        title: Callout Column Settings
        type: heading
        level: 2
        collapsed: true
      - id: callout-min-width
        title: Minimum Sub-Callout Width
        description: for sub-callout in [!multi-column]. in px units
        type: variable-number-slider
        default: 200
        min: 100
        max: 500
        step: 50
        format: px
      - id: callout-gap
        title: Sub-Callout Gap (any unit)
        description: NO spacing between figure and unit
        type: variable-text
        default: 0.5rem
      - id: callout-margin
        title: Sub-Callout Margin (any unit)
        description: to allow some spacing for box-shadow
        type: variable-text
        default: 5px
      - id: float-small-width
        title: Floating Callout Width - Small (in px)
        type: variable-number-slider
        default: 300
        min: 200
        max: 450
        step: 50
        format: px
      - id: float-medium-width
        title: Floating Callout Width - Medium (in px)
        type: variable-number-slider
        default: 400
        min: 300
        max: 550
        step: 50
        format: px
      - id: float-large-width
        title: Floating Callout Width - Large (in px)
        type: variable-number-slider
        default: 600
        min: 500
        max: 750
        step: 50
        format: px
      - id: mc-list-column-title
        title: List Column Settings
        description: using `{.xxx-column-list-xxx}` and `#mcl/list-column`
        type: heading
        level: 2
        collapsed: true
      - id: list-min-width
        title: Minimum Column Width (in px)
        type: variable-number-slider
        default: 200
        min: 100
        max: 500
        step: 50
        format: px
      - id: col-rule-color
        title: Column Ruler Color
        type: variable-themed-color
        format: hsl
        opacity: true
        default-light: '#'
        default-dark: '#'
        alt-format: []
      - id: col-rule-width
        title: Column Ruler Width (in px)
        type: variable-number-slider
        default: 1
        min: 0
        max: 4
        step: 1
        format: px
      - id: mc-list-grid-title
        title: List Grid and List Card
        description: using `#mcl/list-grid` and `#mcl/list-card`
        type: heading
        level: 2
        collapsed: true
      - id: list-grid-min-width
        title: Minimum Grid/Card Width (in px/em or similar)
        type: variable-text
        default: 250px
      - id: mcl-card-bg-color
        title: List Card Background Color
        type: variable-themed-color
        format: hsl
        opacity: true
        default-light: '#'
        default-dark: '#'
        alt-format: []
      - id: mcl-card-header-border-width
        title: Bottom Border for List Card Header (in px/em or similar)
        description: set to 0 to disable the border
        type: variable-text
        default: 1px
      - id: mcl-card-gap
        title: List Card Border Width (in px/em or similar)
        type: variable-text
        default: 0.2em
      - id: mcl-card-border-width
        title: List Card Border Width (in px/em or similar)
        type: variable-text
        default: 1px
      - id: mcl-card-border-color
        title: List Card Border Color
        type: variable-themed-color
        format: hsl
        opacity: true
        default-light: '#'
        default-dark: '#'
        alt-format: []
