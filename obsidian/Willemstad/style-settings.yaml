      - id: bold-modifier
        title: Font Weight Modifier of Bold Text
        type: variable-number-slider
        description: Adjusts the font weight for bold text, on top of the usual font weight for normal text. The default is 200.
        min: -300
        max: 300
        step: 100
        default: 200
