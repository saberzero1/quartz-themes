name: Cyber Glow Tweakbox
id: CG
collapsed: false
settings:
  - id: CG-workspace
    title: Background Controls
    type: heading
    level: 1
    description: Controls for Background/Wallpaper, Settings Colored background
    collapsed: true
  - id: CG-settings-background
    title: Disable Settings Colored Background
    description: Removes background color in settings
    type: class-toggle
    default: false
  - id: CG-workspaceBG
    title: Obsidian Background Controls
    type: heading
    level: 2
    description: Custom background and controls
    collapsed: true
  - id: CG-workspace-background
    title: Enable Workspace Backgound
    description: Enable Custom Wallpaper background
    type: class-toggle
    default: true
  - id: CG-workspace-background-image
    title: Select Background Image
    description: Select Custom to use your custom links or paths to your wallpaper in "Custom Workspace Background Image"
    type: class-select
    allowEmpty: false
    default: CG-workspace-background-image-obsidianbg
    options:
      - label: Twilight of the Empire by Ariverkao
        value: CG-workspace-background-image-obsidianbg
      - label: Custom
        value: CG-workspace-background-image-custom
  - id: CG-workspace-background-image-custom-option
    title: Custom Workspace Background Image
    description: Add your wallpaper. Paste the entire link to the image including "https://" -> url("your link here")
    type: variable-text
    default: url("")
    value: CG-workspace-background-image-custom
  - id: CG-workspace-background-workspace-slider
    title: Container opacity
    description: Suggestion Increase opacity a bit on Dark mode, decrease opacity on light mode.
    type: variable-number-slider
    min: 0.1
    max: 1
    step: 0.01
    default: 0.45
  - id: CG-workspace-background-blur
    title: Background blur
    description: Level of blurryness
    type: variable-number-slider
    min: 0
    max: 20
    step: 1
    default: 15
    format: px
  - id: CG-workspace-background-brightness
    title: Background brightness
    description: Suggestion Increase brightness on Dark mode, decrease brightness on light mode.
    type: variable-number-slider
    min: 0
    max: 3
    step: 0.01
    default: 1.15
  - id: CG-workspace-background-saturation
    title: Background Saturation
    description: Increase/Decrease the color vibrancy of the background image.
    type: variable-number-slider
    min: 0
    max: 4
    step: 0.01
    default: 2
  - id: CG-workspace-background-contrast
    title: Background Contrast
    description: Increase/Decrease the contrast of the background image.
    type: variable-number-slider
    min: 40
    max: 200
    step: 1
    default: 100
    format: '%'
  - id: CG-Workspace
    title: Workspace Controls
    type: heading
    description: Active Window Accent controls, Animations, Phone's Header Folder Path, Full Status-bar
    level: 1
    collapsed: true
  - id: CG-disableAni
    title: Disable Animations
    description: Toggle to remove theme animation (Enable if you see lag, battery drain or huge resource consumption)
    default: false
    type: class-toggle
  - id: CG-header-crumbs
    title: Disable Phone's Header Folder Path
    description: The folder paths in the header easily hides the note's title. Toggle off if you want the folder path on phone.
    default: true
    type: class-toggle
  - title: Disable Full  Status-bar
    description: Returns Status-bar to a hover state
    id: CG-Fullstatus-off
    type: class-toggle
    default: false
  - id: GC-stacked-width
    title: Stacked tabs header width
    description: If the stacked tab looks weird, after altering the width, please change tabs first or open a new tab to "refresh" the theme
    type: variable-number-slider
    min: 20
    max: 70
    step: 1
    default: 35
    format: px
  - id: CG-ActiveWindowAccent
    title: Active Window Accent controls
    type: heading
    level: 2
    description: Active Window Header and Background controls
    collapsed: true
  - id: CG-active-header
    title: Enable Active Header Styling
    description: Active Style will only be active on active pages, exact same behavior to previous versions of the theme
    default: false
    type: class-toggle
  - id: CG-active-background
    title: Remove Active Page Highlight
    description: Enable to Removes the active page highlight
    default: false
    type: class-toggle
  - id: CG-Note
    title: Sidepanel Controls
    type: heading
    description: Controls for Sidebar Toggle, Colorful Folder, File Tree Icon/Chevron
    level: 1
    collapsed: true
  - id: CG-SidepanelToggle
    title: Sidepanel Toggle Controls
    type: heading
    level: 2
    description: Remove Sidepanel Toggle Icon, Custom Sidebar Toggle
    collapsed: true
  - id: CG-SPColor
    title: Remove Sidepanel Toggle Icon Color
    description: Removes the color of the toggle icon
    type: class-toggle
    default: false
  - id: CG-workspace-sbt
    title: Left Sidebar Toggle
    type: class-select
    allowEmpty: false
    description: Pick the Icon/image, be sure that all custom images/gifs are square aspect.
    default: CG-MObsidian-sbt
    options:
      - label: New Obsidian Logo
        value: CG-MObsidian-sbt
      - label: Classic Obsidian Logo
        value: CG-Obsidian-sbt
      - label: Custom
        value: CG-Custom-sbt
  - id: CG-workspace-custom-sbt
    title: Custom Left Sidebar Toggle
    description: Add your custom Left Toggle. Paste the entire link to the image including "https://" -> url("your link here"), Obsidian no longer supports local links.
    type: variable-text
    default: url("")
    value: CG-Custom-sbt
  - id: CG-colorFolder
    title: Colorful Folder Controls
    type: heading
    level: 2
    description: Colorful Folders
    collapsed: true
  - id: CG-colorfulFolder
    title: Colorful Folders
    description: Enable Colorful Folders
    default: false
    type: class-toggle
  - id: CG-scifiFolder
    title: SciFi Folders
    description: Enabling will restores Colorful Folders to the original rectangular design.
    type: class-toggle
    default: false
  - id: CG-FileTreeChevron
    title: File Tree Icon/Chevron Controls
    type: heading
    level: 2
    description: Remove Sidepanel Toggle Icon, Custom Sidebar Toggle
    collapsed: true
  - id: CG-folder-icon
    title: Hide Folder Icon
    description: Enable to ide file explorer icon
    type: class-toggle
    default: false
  - id: CG-chevron
    title: Show Chevron (Collapse Arrow)
    description: Toggle the visibility of the chevron icons
    type: class-toggle
    default: false
  - id: CG-Note
    title: Note Controls
    type: heading
    description: Controls for Callout, Codeblock, Headings, Custom Checkbox, Readable line width, Bullet Style
    level: 1
    collapsed: true
  - id: CG-strike
    title: Strikeout Text
    description: Disable the red strikout for better text readability
    default: false
    type: class-toggle
  - id: CG-custom-checkbox
    title: Custom Checkbox
    description: Enable custom checkboxes for checkbox customization
    default: true
    type: class-toggle
  - id: CG-line-width
    title: Readable line width
    description: The maximum line width in rem (unit relative to Appearance -> Font Size)
    type: variable-number-slider
    default: 40
    min: 30
    max: 70
    step: 1
    format: rem
  - id: CG-bullet-style
    title: Bullet Style
    type: class-select
    allowEmpty: false
    default: CG-triangle
    options:
      - label: ▻ Triangle Bullet
        value: CG-triangle
      - label: 𓂀 Eye of Horus Bullet
        value: CG-EyeofHorus
      - label: 𖤍 Phase-D Bullet
        value: CG-Triwing
      - label: ○ Circle Bullet
        value: CG-round
      - label: □ Square Bullet
        value: CG-Square
  - id: CG-CalloutControls
    title: Callout Controls
    type: heading
    level: 2
    description: Restore Callout, Disable Bullets in Callout
    collapsed: true
  - id: calloutcut
    title: Restore Callout
    description: Enabling will restores callouts to the original rectangular design.
    type: class-toggle
    default: false
  - title: Disable Bullets in Callout
    description: Remove bullet list ticker when inside of callouts
    id: CG-bulletcallout
    type: class-toggle
    default: false
  - id: CG-cite-font
    title: Cite/Signature Font (Used in blockquotes and quote callouts)
    description: Get Font from Cyber Glow's Github page. Recommend using a cursive font style
    type: variable-text
    default: Edwardian Script ITC
  - id: CG-CodeblockControls
    title: Codeblock Controls
    type: heading
    level: 2
    description: Disable Codeblock Gutter line and Scifi design
    collapsed: true
  - title: Disable Codeblocks Gutter
    description: Remove line numbers and additional styling to code blocks
    id: no-codeblock-line-numbers
    type: class-toggle
    default: false
  - id: SciFiCode
    title: Scifi Codeblocks
    description: Enables SciFi Codeblock
    type: class-toggle
    default: false
  - id: CG-Headings
    title: Heading Controls
    type: heading
    level: 2
    description: Restore Bold Header, Mini Header Indication
    collapsed: true
  - id: restore-header
    title: Restore Bold Header
    description: Restores the bold header style to the original Obsidian style
    type: class-toggle
    default: false
  - id: mini-header-hide
    title: Show Header Indication
    description: Enabling this will show the small header indicator next to headers, such as H1, H2, etc.
    type: class-toggle
    default: true
  - id: CG-hr
    title: Heading Dividing Line (---)
    type: class-select
    allowEmpty: false
    default: CG-NewObsidian-hr
    options:
      - label: New Obsidian Outline
        value: CG-NewObsidian-hr
      - label: CG Old Default
        value: CG-OG-hr
      - label: No Logo
        value: CG-None-hr
      - label: Classic Obsidian Outline
        value: CG-ClassicObsidian-hr
      - label: Windows
        value: CG-Windows-hr
      - label: Apple
        value: CG-Apple-hr
  - id: CG-color
    title: Text, Color and Glow Controls
    type: heading
    description: Controls for Text Font/Color/Glow, Active Color Picker, Icon Color Picker
    level: 1
    collapsed: true
  - title: Hover Color
    id: hover-accent
    type: variable-color
    format: hsl-values
    default: hsl(198, 63%, 57%)
  - title: List Color
    id: bulletlist-color
    type: variable-color
    format: hex
    default: '#4CADD6'
  - id: CG-headercolor
    title: Header Color & Glow Controls
    type: heading
    description: Control Colors, Font & Glow of Headers (H1-6)
    level: 2
    collapsed: true
  - id: CG-H1Slider
    title: H1 Color, Font & Glow
    type: heading
    description: Change Color, Text Font and glow H2-6 Glow
    level: 3
    collapsed: true
  - title: Header 1 Color
    id: h1-glow
    type: variable-color
    format: hex
    default: '#4CADD6'
  - id: h1-size
    title: H1 font size
    description: Enter Header 1 Font size
    type: variable-text
    default: 2.1em
  - id: title-heading
    title: Title Heading (H1)
    type: variable-text
    default: Space Wham
  - id: CG-Header1-slider1
    title: Header Primary Glow
    description: Change the spread of the glow effect on header 1 text (set to -1 to disable glow)
    type: variable-number-slider
    min: -1
    max: 10
    step: 1
    default: 5
    format: px
  - id: CG-Header1-slider2
    title: Header Secondary Glow
    description: Change the spread of the glow effect on header 1 text
    type: variable-number-slider
    min: 0
    max: 20
    step: 1
    default: 10
    format: px
  - id: CG-Header1-slider3
    title: Header Tertiary Glow
    description: Change the spread of the glow effect on header 1 text
    type: variable-number-slider
    min: 0
    max: 40
    step: 1
    default: 20
    format: px
  - id: CG-Header1-slider4
    title: Header Quaternary Glow
    description: Change the spread of the glow effect on header 1 text
    type: variable-number-slider
    min: 0
    max: 80
    step: 1
    default: 40
    format: px
  - id: CG-Header1-slider5
    title: Header Quinary Glow
    description: Change the spread of the glow effect on header 1 text
    type: variable-number-slider
    min: 0
    max: 90
    step: 1
    default: 45
    format: px
  - id: CG-HeaderSlider
    title: H2-6 Color, Text & Glow
    type: heading
    description: Change Text Font, Color and Glow H2-6 Glow
    level: 3
    collapsed: true
  - title: Header 2 Color
    id: h2-glow
    type: variable-color
    format: hex
    default: '#0cd0d0'
  - id: h2-size
    title: H2 font size
    description: Enter Header 2 Font size
    type: variable-text
    default: 1.85em
  - title: Header 3 Color
    id: h3-glow
    type: variable-color
    format: hex
    default: '#00d200'
    collapsed: true
  - id: h3-size
    title: H3 font size
    description: Enter Header 3 Font size
    type: variable-text
    default: 1.65em
  - id: major-heading
    title: Major Heading font (H2-3)
    description: Change the Heading 2 and 3 fonts by typing the name of the desired font in the textbox, For System Default type Inter.
    type: variable-text
    default: Orbitron
  - title: Header 4 Color
    id: h4-glow
    type: variable-color
    format: hex
    default: '#ffc400'
  - id: h4-size
    title: H4 font size
    description: Enter Header 4 Font size
    type: variable-text
    default: 1.45em
  - title: Header 5 Color
    id: h5-glow
    type: variable-color
    format: hex
    default: '#FF0000'
  - id: h5-size
    title: H5 font size
    description: Enter Header 5 Font size
    type: variable-text
    default: 1.25em
  - title: Header 6 Color
    id: h6-glow
    type: variable-color
    format: hex
    default: '#FF00FF'
  - id: h6-size
    title: H6 font size
    description: Enter Header 6 Font size
    type: variable-text
    default: 1.25em
  - id: minor-heading
    title: Minor Headings font (H4-6)
    description: Change the Heading 4-6 fonts by typing the name of the desired font in the textbox, For System Default type Inter.
    type: variable-text
    default: Orbitron
  - id: CG-Header-slider1
    title: Header Primary Glow
    description: Change the spread of the glow effect on header (h2-6) text (set to -1 to disable glow)
    type: variable-number-slider
    min: -1
    max: 10
    step: 1
    default: 5
    format: px
  - id: CG-Header-slider2
    title: Header Secondary Glow
    description: Change the spread of the glow effect on header (h2-6) text
    type: variable-number-slider
    min: 0
    max: 20
    step: 1
    default: 10
    format: px
  - id: CG-Header-slider3
    title: Header Tertiary Glow
    description: Change the spread of the glow effect on header (h2-6) text
    type: variable-number-slider
    min: 0
    max: 40
    step: 1
    default: 20
    format: px
  - id: CG-Header-slider4
    title: Header Quaternary Glow
    description: Change the spread of the glow effect on header (h2-6) text
    type: variable-number-slider
    min: 0
    max: 20
    step: 1
    default: 10
    format: px
  - id: CG-textColor
    title: General Text Controls
    type: heading
    description: General Text Font and Color
    level: 2
    collapsed: true
  - id: default-font
    title: Base font (UI and notes font)
    description: Change the base font by typing the name of the desired font in the textbox, For System Default type Inter.
    type: variable-text
    default: OxaniumFira
  - title: SidePanel muted Text Color
    id: custom-textcolor
    description: Custom accent color for text elements
    type: variable-color
    format: hex
    default: '#b3b3b3'
  - title: Hover Text Color
    id: custom-hovercolor
    description: Custom accent color for text elements
    type: variable-color
    format: hex
    default: '#ffffff'
  - id: CG-IconColor
    title: Icon Color Picker
    type: heading
    description: Change Colors of Icons
    level: 2
    collapsed: true
  - title: Muted Icon Color
    id: custom-iconcolor
    description: Custom accent color for text elements
    type: variable-color
    format: hex
    default: '#b3b3b3'
  - title: Icon Hover
    id: custom-iconhover
    description: Custom accent color for text elements
    type: variable-color
    format: hex
    default: '#ffffff'
  - id: CG-activecolor
    title: Active Color Picker
    type: heading
    description: Change Colors of Inline Code background/border
    level: 2
    collapsed: true
  - title: Window Highlight Accent
    id: custom-windhighlight-accent
    type: variable-color
    format: hsl-values
    default: hsl(198, 63%, 57%)
  - title: Active Tab Accent
    id: activetab-color
    type: variable-color
    format: hsl-values
    default: hsl(198, 63%, 57%)
  - title: Active Note Title Color
    id: active-title
    type: variable-color
    format: hsl-values
    default: hsl(198, 63%, 57%)
  - title: Selected Accent
    id: custom-selected-accent
    type: variable-color
    format: hsl-values
    default: hsl(198, 63%, 57%)
  - id: CG-inlinecolor
    title: Inline Code Controls
    type: heading
    description: Enable and Change Colors of Inline Code background/border
    level: 2
    collapsed: true
  - id: inline-border
    title: Enable Custom Inline Color
    description: Enabled Custom background and border color for inline code
    type: class-toggle
    default: false
  - id: inlineblock-border
    title: Enable Custom Inline Color within Codeblocks
    description: Enabled Custom background and border color for inline code
    type: class-toggle
    default: false
  - title: Inline Code Color
    id: custom-inline
    description: Custom Inline Background Code Color
    type: variable-color
    opacity: true
    format: rgb
    default: rgba(30, 30, 30, 0.75)
  - title: Inline Code Border Color
    id: custom-inlineborder
    description: Custom Inline Background Code Border Color
    type: variable-color
    opacity: true
    format: rgb
    default: rgba(30, 30, 30, 0.75)
  - id: CG-linkcolor
    title: Link Color & Glow Controls
    type: heading
    description: Control Link Text Color & Glow
    level: 2
    collapsed: true
  - title: Outgoing link color
    id: outlink-color
    type: variable-color
    format: hex
    default: '#FFA500'
  - title: Internal link color
    id: inlink-color
    type: variable-color
    format: hex
    default: '#ffc400'
  - id: CG-link-slider1
    title: Link Primary Glow
    description: Change the spread of the glow effect on hover for links
    type: variable-number-slider
    min: -1
    max: 10
    step: 1
    default: 5
    format: px
  - id: CG-link-slider2
    title: Link Secondary Glow
    description: Change the spread of the glow effect on hover for links
    type: variable-number-slider
    min: 0
    max: 20
    step: 1
    default: 10
    format: px
  - id: CG-link-slider3
    title: Link Tertiary Glow
    description: Change the spread of the glow effect on hover for links
    type: variable-number-slider
    min: 0
    max: 40
    step: 1
    default: 20
    format: px
  - id: CG-link-slider4
    title: Link Quaternary Glow
    description: Change the spread of the glow effect on hover for links
    type: variable-number-slider
    min: 0
    max: 70
    step: 1
    default: 35
    format: px
  - id: CG-boldcolor
    title: Bold Color & Glow Controls
    type: heading
    description: Control Bold/Link Text Color & Glow
    level: 2
    collapsed: true
  - title: Bold Text Glow
    id: custom-boldText-glow
    type: variable-color
    format: hsl-values
    default: hsl(198, 63%, 57%)
  - title: Bold Text Color
    id: custom-boldText-color
    type: variable-color
    format: rgb-values
    default: rgb(230, 229, 229)
  - id: CG-Bold-slider1
    title: Bold/Italic Primary Glow
    description: Change the spread of the glow effect on bold/italic text
    type: variable-number-slider
    min: -1
    max: 10
    step: 1
    default: 5
    format: px
  - id: CG-Bold-slider2
    title: Bold/Italic Secondary Glow
    description: Change the spread of the glow effect on bold/italic text
    type: variable-number-slider
    min: 0
    max: 20
    step: 1
    default: 10
    format: px
  - id: CG-Test
    title: ⚠️ Experimental Controls ⚠️
    type: heading
    description: Experiments, May be Abandoned/Unimplemented
    level: 1
    collapsed: true
  - id: CG-FileTreeShade1
    title: File Tree Shade Test 1
    description: Adds a background shade to file tree items **DO NOT REPORT ISSUES FOR THIS CONTROL**
    type: class-toggle
    default: false
  - id: CG-FileTreeShade2
    title: File Tree Shade Test 2
    description: Adds a background shade to file tree items **DO NOT REPORT ISSUES FOR THIS CONTROL**
    type: class-toggle
    default: false
